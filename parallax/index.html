<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Parallax Sections</title>
    <style>
        /* Basic reset to ensure 100vh works correctly */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            background-color: #111;
            color: white;
        }

        /* --- Your Provided CSS --- */
        section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        h1 {
            font-size: 10vw;
            z-index: 1;
            font-weight: 600;
            text-align: center;
            color: white;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5); /* Added for readability over images */
            margin: 0;
        }
    </style>
</head>
<body>

    <section>
        <h1>Simple parallax sections</h1>
    </section>

    <section class="section">
        <div class="bg"></div>
        <h1>Hey look, a title</h1>
    </section>

    <section class="section">
        <div class="bg"></div>
        <h1>So smooth</h1>
    </section>

    <section class="section">
        <div class="bg"></div>
        <h1>Nice, right?</h1>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let getRatio = el => window.innerHeight / (window.innerHeight + el.offsetHeight);

        gsap.utils.toArray(".section").forEach((section, i) => {
            section.bg = section.querySelector(".bg");

            // Give the backgrounds some random images
            section.bg.style.backgroundImage = `url(https://assets.codepen.io/16327/portrait-pattern-${i + 2}.jpg)`;

            // the first image (i === 0) should be handled differently because it should start at the very top.
            // use function-based values in order to keep things responsive
            gsap.fromTo(section.bg, {
                backgroundPosition: () => i ? `50% ${-window.innerHeight * getRatio(section)}px` : "50% 0px"
            }, {
                backgroundPosition: () => `50% ${window.innerHeight * (1 - getRatio(section))}px`,
                ease: "none",
                scrollTrigger: {
                    trigger: section,
                    start: () => i ? "top bottom" : "top top",
                    end: "bottom top",
                    scrub: true,
                    invalidateOnRefresh: true // to make it responsive
                }
            });
        });
    </script>
</body>
</html>
