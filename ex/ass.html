<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Surprise Box</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #444;
            pointer-events: none;
            letter-spacing: 1px;
            font-size: 14px;
        }
        #ui span { color: #ff0055; font-weight: bold; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        Wait for the <span>Reveal</span>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- USER CONFIGURATION ---
        const MORPH_CONFIG = {
            color: 0x0088ff,
            size: 4.2, 
            segments: 48 
        };

        // *** CHANGE THIS VARIABLE TO SWAP THE OBJECT ***
        // Options: 'sphere', 'icosahedron', 'torus', 'knot'
        const HIDDEN_ITEM_CONFIG = {
            type: 'icosahedron', 
            color: 0xff0055,
            size: 1.5,
            wireframe: true // Set to false for solid
        };

        let scene, camera, renderer;
        let mainGroup; // The parent container for everything
        let morphMesh; // The outer box
        let hiddenMesh; // The object inside
        let morphData; // Stores vertices for morphing

        // Mouse Input
        const mouse = new THREE.Vector2();
        const targetMouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            scene.fog = new THREE.FogExp2(0x050505, 0.02);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0x222222);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const rimLight = new THREE.PointLight(0x00ff88, 5, 20);
            rimLight.position.set(-5, 0, -5);
            scene.add(rimLight);

            // --- BUILD THE SCENE ---
            createObjects();

            // Events
            window.addEventListener('resize', onResize);
            window.addEventListener('mousemove', onMouseMove);

            animate();
        }

        function createObjects() {
            // 1. Create the Main Group (The Pivot)
            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            // 2. Create the Hidden Object (The Prize)
            let innerGeo;
            const s = HIDDEN_ITEM_CONFIG.size;
            
            // Factory logic for the hidden object
            switch (HIDDEN_ITEM_CONFIG.type) {
                case 'sphere': innerGeo = new THREE.SphereGeometry(s, 32, 32); break;
                case 'torus': innerGeo = new THREE.TorusGeometry(s * 0.8, s * 0.3, 16, 50); break;
                case 'knot': innerGeo = new THREE.TorusKnotGeometry(s * 0.6, s * 0.2, 100, 16); break;
                case 'icosahedron': 
                default: innerGeo = new THREE.IcosahedronGeometry(s, 0); break;
            }

            const innerMat = new THREE.MeshStandardMaterial({
                color: HIDDEN_ITEM_CONFIG.color,
                emissive: HIDDEN_ITEM_CONFIG.color,
                emissiveIntensity: 0.5,
                wireframe: HIDDEN_ITEM_CONFIG.wireframe,
                roughness: 0.2,
                metalness: 0.8
            });

            hiddenMesh = new THREE.Mesh(innerGeo, innerMat);
            mainGroup.add(hiddenMesh); // Add inside group

            // 3. Create the Morphing Box (The Shell)
            const geometry = new THREE.BoxGeometry(
                MORPH_CONFIG.size, MORPH_CONFIG.size, MORPH_CONFIG.size, 
                MORPH_CONFIG.segments, MORPH_CONFIG.segments, MORPH_CONFIG.segments
            );
            
            const material = new THREE.MeshStandardMaterial({
                color: MORPH_CONFIG.color,
                roughness: 0.2,
                metalness: 0.6,
                side: THREE.DoubleSide // Important so we see inside of box when unfolded
            });

            morphMesh = new THREE.Mesh(geometry, material);
            morphMesh.castShadow = true;
            morphMesh.receiveShadow = true;
            mainGroup.add(morphMesh); // Add inside group

            // Save morph data
            const posAttr = geometry.attributes.position;
            const normAttr = geometry.attributes.normal;
            
            morphData = {
                originalPos: Float32Array.from(posAttr.array),
                originalNormals: Float32Array.from(normAttr.array),
                count: posAttr.count
            };
        }

        // --- MORPH MATH ---
        function getBlobShape(x, y, z, time) {
            const len = Math.sqrt(x*x + y*y + z*z);
            let nx = x / len; let ny = y / len; let nz = z / len;
            const noise = Math.sin(nx * 3 + time) + Math.cos(ny * 2 + time) + Math.sin(nz * 4 + time);
            const r = (MORPH_CONFIG.size / 1.5) + (noise * 0.3);
            return { x: nx * r, y: ny * r, z: nz * r };
        }
        function getSphereShape(x, y, z) {
            const len = Math.sqrt(x*x + y*y + z*z);
            const r = MORPH_CONFIG.size / 1.5;
            return { x: (x / len) * r, y: (y / len) * r, z: (z / len) * r };
        }
        function getCubeShape(x, y, z) { return { x, y, z }; }
        function getUnfoldingShape(x, y, z, nx, ny, nz) {
            let tx = x, ty = y, tz = z;
            const offset = MORPH_CONFIG.size * 0.6;
            
            if (nx > 0.5) { tx += offset; ty += x * 0.2; }
            else if (nx < -0.5) { tx -= offset; ty += x * -0.2; }
            else if (ny > 0.5) { ty += offset; }
            else if (ny < -0.5) { ty -= offset; }
            else if (nz > 0.5) { tz += offset; }
            else if (nz < -0.5) { tz -= offset; }
            return { x: tx, y: ty, z: tz };
        }

        function updateMorph(progress, time) {
            const positions = morphMesh.geometry.attributes.position;

            for (let i = 0; i < morphData.count; i++) {
                const ix = i * 3;
                const ox = morphData.originalPos[ix]; const oy = morphData.originalPos[ix+1]; const oz = morphData.originalPos[ix+2];
                const nx = morphData.originalNormals[ix]; const ny = morphData.originalNormals[ix+1]; const nz = morphData.originalNormals[ix+2];
                let target = {x:0, y:0, z:0};

                if (progress < 1) { 
                    // BLOB -> SPHERE
                    const t = progress;
                    const blob = getBlobShape(ox, oy, oz, time);
                    const sphere = getSphereShape(ox, oy, oz);
                    target.x = THREE.MathUtils.lerp(blob.x, sphere.x, t); target.y = THREE.MathUtils.lerp(blob.y, sphere.y, t); target.z = THREE.MathUtils.lerp(blob.z, sphere.z, t);
                } else if (progress < 2) {
                    // SPHERE -> CUBE
                    const t = progress - 1;
                    const sphere = getSphereShape(ox, oy, oz);
                    const cube = getCubeShape(ox, oy, oz);
                    target.x = THREE.MathUtils.lerp(sphere.x, cube.x, t); target.y = THREE.MathUtils.lerp(sphere.y, cube.y, t); target.z = THREE.MathUtils.lerp(sphere.z, cube.z, t);
                } else {
                    // CUBE -> UNFOLD
                    const t = progress - 2;
                    const cube = getCubeShape(ox, oy, oz);
                    const unfold = getUnfoldingShape(ox, oy, oz, nx, ny, nz);
                    target.x = THREE.MathUtils.lerp(cube.x, unfold.x, t); target.y = THREE.MathUtils.lerp(cube.y, unfold.y, t); target.z = THREE.MathUtils.lerp(cube.z, unfold.z, t);
                }
                positions.setXYZ(i, target.x, target.y, target.z);
            }
            positions.needsUpdate = true;
            morphMesh.geometry.computeVertexNormals();
        }

        // --- ANIMATION ---
        function onMouseMove(event) {
            targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.003;
            // Loop 0 -> 3
            const loopSpeed = Date.now() * 0.0005; 
            const loopProgress = ((Math.sin(loopSpeed) + 1) / 2) * 3;

            mouse.lerp(targetMouse, 0.05);

            if (mainGroup) {
                // 1. WATCHER: Rotate the ENTIRE group (Box + Prize)
                mainGroup.lookAt(mouse.x * 10, mouse.y * 10, 5);
                mainGroup.rotateZ(0.002); 

                // 2. MORPH: Animate the shell
                updateMorph(loopProgress, time);

                // 3. PRIZE ANIMATION: Spin the hidden object locally
                // It only becomes visible when the box unfolds, but we animate it always
                if (hiddenMesh) {
                    hiddenMesh.rotation.x = time;
                    hiddenMesh.rotation.y = time * 0.5;
                    // Pulse scale slightly
                    const s = 1 + Math.sin(time * 2) * 0.1;
                    hiddenMesh.scale.set(s, s, s);
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
