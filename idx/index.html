<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Parallax Demo</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            background-color: #111;
        }

        /* 1. The Fixed Background (Stays put) */
        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120vh;
            z-index: -1;
            background-image: url('https://picsum.photos/1920/1080');
            background-size: cover;
            background-position: center;
        }

        /* 2. Parallax Wrapper (Transparent, lets us see the BG) */
        .parallax-wrapper {
            position: relative;
            z-index: 1;
            height: 200vh; /* This dictates how long the parallax lasts */
        }

        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* 3. The New Static Section (Solid, covers the BG) */
        .normal-content {
            position: relative;
            z-index: 2; /* Must be higher than wrapper */
            background-color: #111; /* Solid color to hide the image behind it */
            color: #eee;
            padding: 100px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 { font-size: 5rem; font-weight: 800; margin-bottom: 20px; }
        
        p {
            font-size: 1.5rem;
            max-width: 600px;
            line-height: 1.6;
        }
        
        /* Styles specifically for text over the image */
        .parallax-text {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .scroll-indicator {
            margin-top: 50px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <div class="parallax-bg"></div>

    <div class="parallax-wrapper">
        <div class="section">
            <h1 class="title">Parallax Area</h1>
            <p class="parallax-text">Scroll down. The background moves slowly.</p>
            <div class="scroll-indicator">↓</div>
        </div>
        <div class="section">
            <h1>Still Parallax</h1>
            <p class="parallax-text">Keep scrolling to hit the static section.</p>
        </div>
    </div>

    <div class="normal-content">
        <h1>Normal Section</h1>
        <p>
            I have a solid background color (black). 
            When I scroll up, I physically cover the fixed image behind me.
            There is no parallax effect here.
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
