<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobbin-style Floating Logos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- Custom Animations --- */
        /* 1. Slow vertical bob */
        @keyframes float-y-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        /* 2. Medium vertical bob */
        @keyframes float-y-medium {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        /* 3. Diagonal figure-eight movement */
        @keyframes float-diagonal {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(5px, -8px); }
            50% { transform: translate(10px, 0px); }
            75% { transform: translate(5px, 8px); }
        }
        /* 4. Gentle rocking rotation */
        @keyframes rock-gentle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        /* 5. Breathing scale effect */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15); }
        }
        /* 6. Infinite scroll marquee */
        @keyframes marquee-up {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* --- Utility classes --- */
        .animate-float-slow { animation: float-y-slow 5s ease-in-out infinite; }
        .animate-float-medium { animation: float-y-medium 3s ease-in-out infinite; }
        .animate-float-diagonal { animation: float-diagonal 10s ease-in-out infinite; }
        .animate-rock { animation: rock-gentle 4s ease-in-out infinite; }
        .animate-breathe { animation: breathe 4s ease-in-out infinite; }
        .animate-marquee { animation: marquee-up 25s linear infinite; }
        
        /* Needed for 3D Tilt */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        <div class="mb-12 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">Logo Floating Variations</h1>
            <p class="text-slate-500">Smooth, physics-based interactions mimicking premium design showcases.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 relative">

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200 overflow-hidden">
                 <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-50 to-transparent opacity-50"></div>
                <div class="animate-float-slow bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex items-center justify-center relative z-10">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" alt="React" class="h-20 w-20 object-contain drop-shadow-sm transition-all duration-300 hover:scale-110 hover:drop-shadow-md">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">1. Vertical Sine</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200">
                <div class="animate-float-diagonal bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex items-center justify-center">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg" alt="Vue" class="h-20 w-20 object-contain drop-shadow-sm">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">2. Diagonal Drift</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200">
                <div class="animate-breathe bg-gradient-to-br from-white to-slate-50 p-8 rounded-2xl border border-slate-100 w-48 h-48 flex items-center justify-center">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg" alt="Figma" class="h-20 w-20 object-contain drop-shadow-sm">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">3. Breathing Pulse</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200 cursor-crosshair" id="magnetic-area">
                <div id="magnetic-card" class="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex items-center justify-center transition-transform duration-200 ease-out will-change-transform">
                     <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/swift/swift-original.svg" alt="Swift" class="h-20 w-20 object-contain drop-shadow-sm">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">4. Magnetic Hover</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200 perspective-1000" id="tilt-area">
                <div id="tilt-card" class="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex items-center justify-center transform-style-3d transition-all duration-100 ease-linear">
                     <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" alt="Apple" class="h-20 w-20 object-contain drop-shadow-sm text-slate-800">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">5. 3D Holographic Tilt</span>
            </div>

            <div class="relative h-64 w-full overflow-hidden border border-slate-200 rounded-3xl bg-slate-50">
                <div class="absolute inset-x-0 top-0 h-20 bg-gradient-to-b from-slate-50 to-transparent z-10 pointer-events-none"></div>
                <div class="absolute inset-x-0 bottom-0 h-20 bg-gradient-to-t from-slate-50 to-transparent z-10 pointer-events-none"></div>
                
                <div class="animate-marquee flex flex-col gap-6 p-6 items-center">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-24 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" class="h-10"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-32 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg" class="h-12"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-24 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/meta/meta-original.svg" class="h-10"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-24 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" class="h-10"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-32 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg" class="h-12"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-32 h-24 flex items-center justify-center flex-shrink-0"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/meta/meta-original.svg" class="h-10"></div>
                </div>
                <span class="absolute bottom-4 left-0 right-0 text-center z-20 text-xs font-medium text-slate-400 uppercase tracking-wider">6. Infinite Scroll</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center overflow-hidden rounded-3xl bg-slate-100/50 border border-slate-200">
                <div id="parallax-bg" class="absolute w-48 h-48 bg-indigo-200/40 rounded-full blur-3xl -top-24 -right-12 transition-transform duration-75 ease-out will-change-transform"></div>
                <div id="parallax-card" class="relative z-10 bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex items-center justify-center will-change-transform">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg" alt="NextJS" class="h-20 w-20 object-contain drop-shadow-sm">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">7. Page Scroll Parallax</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200">
                <div class="absolute top-0 left-1/2 h-12 w-0.5 bg-slate-300 z-0"></div>
                <div class="animate-rock origin-top bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-48 h-48 flex flex-col items-center justify-center relative z-10 mt-8">
                    <div class="w-3 h-3 bg-slate-300 rounded-full absolute -top-1.5 left-1/2 transform -translate-x-1/2"></div>
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/shopify/shopify-original.svg" alt="Shopify" class="h-16 w-16 object-contain drop-shadow-sm">
                </div>
                 <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">8. Hanging Sign</span>
            </div>

            <div class="relative h-64 w-full flex items-center justify-center bg-slate-100/50 rounded-3xl border border-slate-200 overflow-hidden" id="inertia-area">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-50/50 to-transparent pointer-events-none"></div>
                <div id="inertia-card" class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-sm border border-white/50 w-48 h-48 flex items-center justify-center pointer-events-none will-change-transform">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/framer/framer-original.svg" alt="Framer" class="h-20 w-20 object-contain drop-shadow-sm">
                </div>
                <span class="absolute bottom-4 text-xs font-medium text-slate-400 uppercase tracking-wider">9. Heavy Inertia</span>
            </div>

            <div class="relative h-[40rem] w-[40rem] bg-slate-50 rounded-3xl overflow-hidden border border-slate-200">
                 <div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                    <span class="bg-white/80 backdrop-blur px-4 py-2 rounded-full shadow-sm text-sm font-bold text-slate-700 border border-slate-100">10. Ambient Logo Scatter</span>
                 </div>
                 
                 <div class="absolute top-8 left-8 animate-float-slow p-3 bg-white rounded-2xl shadow-sm border border-slate-100">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" class="h-20 w-20">
                 </div>
                 
                 <div class="absolute top-1/4 right-12 animate-float-medium p-2 bg-white rounded-xl shadow-sm border border-slate-100" style="animation-delay: 0.5s;">
                     <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-plain.svg" class="h-20 w-20">
                 </div>

                 <div class="absolute bottom-10 left-16 animate-float-diagonal p-4 bg-white rounded-2xl shadow-sm border border-slate-100" style="animation-delay: 1s;">
                     <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" class="h-20 w-20 rounded-md">
                 </div>
                 
                 <div class="absolute bottom-20 right-24 animate-float-slow p-2 bg-white rounded-xl shadow-sm border border-slate-100 opacity-80" style="animation-delay: 2s;">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" class="h-20 w-20">
                 </div>

                 <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-blue-100 rounded-full blur-3xl opacity-30 animate-breathe" style="animation-duration: 8s"></div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 4. Magnetic Effect ---
            const magneticCard = document.getElementById('magnetic-card');
            const magneticArea = document.getElementById('magnetic-area');

            magneticArea.addEventListener('mousemove', (e) => {
                const rect = magneticArea.getBoundingClientRect();
                // Calculate mouse position relative to the center of the container
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                // Move element a fraction of the mouse distance (0.2 = 20%)
                magneticCard.style.transform = `translate(${x * 0.25}px, ${y * 0.25}px)`;
            });

            magneticArea.addEventListener('mouseleave', () => {
                // Reset position on leave
                magneticCard.style.transform = `translate(0px, 0px)`;
            });


            // --- 5. 3D Tilt Effect ---
            const tiltCard = document.getElementById('tilt-card');
            const tiltArea = document.getElementById('tilt-area');

            tiltArea.addEventListener('mousemove', (e) => {
                const rect = tiltArea.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate rotation based on mouse position from center
                // Max tilt is set to 12 degrees
                const rotateX = ((y - centerY) / centerY) * -12; 
                const rotateY = ((x - centerX) / centerX) * 12;

                tiltCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            tiltArea.addEventListener('mouseleave', () => {
                tiltCard.style.transform = `rotateX(0deg) rotateY(0deg)`;
            });


            // --- 7. Scroll Parallax ---
            const parallaxCard = document.getElementById('parallax-card');
            const parallaxBg = document.getElementById('parallax-bg');
            let lastScrollY = window.scrollY;
            
            function updateParallax() {
                const scrollY = window.scrollY;
                const rect = parallaxCard.parentElement.getBoundingClientRect();
                
                // Check if the component is currently visible in the viewport
                if(rect.top < window.innerHeight && rect.bottom > 0) {
                    // Calculate relative scroll distance from when the component entered viewport
                    const relativeScroll = scrollY - (rect.top + scrollY - window.innerHeight/2);

                    // Move card slightly opposite to scroll direction
                    parallaxCard.style.transform = `translateY(${relativeScroll * -0.08}px)`;
                    // Move background blob slower in same direction as scroll
                    parallaxBg.style.transform = `translateY(${relativeScroll * 0.04}px)`;
                }
                lastScrollY = scrollY;
                requestAnimationFrame(updateParallax);
            }
            updateParallax(); // Start loop


            // --- 9. Inertia / Lag Effect ---
            const inertiaArea = document.getElementById('inertia-area');
            const inertiaCard = document.getElementById('inertia-card');
            
            // Target positions (where mouse is)
            let targetX = 0, targetY = 0;
            // Current positions (where card is)
            let currentX = 0, currentY = 0;
            
            inertiaArea.addEventListener('mousemove', (e) => {
                const rect = inertiaArea.getBoundingClientRect();
                // Calculate target position relative to center
                targetX = (e.clientX - rect.left) - rect.width/2;
                targetY = (e.clientY - rect.top) - rect.height/2;
            });
            
            inertiaArea.addEventListener('mouseleave', () => {
                // Reset target to center on leave
                targetX = 0;
                targetY = 0;
            });

            // Smooth animation loop using Linear Interpolation (Lerp)
            function animateInertia() {
                // The 0.06 factor determines the "heaviness". Smaller = more lag.
                currentX += (targetX - currentX) * 0.06;
                currentY += (targetY - currentY) * 0.06;
                
                // Apply movement, limited to prevent flying too far
                const limitedX = Math.max(-80, Math.min(80, currentX));
                const limitedY = Math.max(-60, Math.min(60, currentY));

                inertiaCard.style.transform = `translate(${limitedX}px, ${limitedY}px)`;
                requestAnimationFrame(animateInertia);
            }
            animateInertia();
        });
    </script>
</body>
</html>
