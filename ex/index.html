<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js "A" Shape with Capsules</title>
    <style>
      body {
        margin: 0;
        overflow-x: hidden;
      }
      canvas {
        display: block;
      }

      #scene {
        width: 100vw;
        min-height: 120vh;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/CapsuleGeometry.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202020);

      const camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      // renderer.domElement.style.display= "100px";
      console.log(renderer.domElement.style.display);
      document.body.querySelector("div#scene").appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0xffffff, 1, 100);
      pointLight.position.set(5, 5, 5);
      scene.add(pointLight);

      const textureLoader = new THREE.TextureLoader();

      textureLoader.setCrossOrigin("anonymous");

      const texture = textureLoader.load(
        "https://threejs.org/examples/textures/brick_diffuse.jpg"
      );

      texture.wrapS = THREE.RepeatWrapping; 
      texture.wrapT = THREE.RepeatWrapping;

      texture.repeat.set(1, 100);

      const capsuleMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        map: texture,
        roughness: 0.5,
        metalness: 0.1,
      });

      function createCapsule(radius, length) {
        const geometry = new THREE.CapsuleGeometry(radius, length, 4, 10);
        return new THREE.Mesh(geometry, capsuleMaterial);
      }

      const aGroup = new THREE.Group();

      const leftLeg = createCapsule(0.5, 4);
      leftLeg.position.set(-0.9, 0, 0);
      leftLeg.rotation.z = -Math.PI / 6;
      aGroup.add(leftLeg);

      const rightLeg = createCapsule(0.5, 4);
      rightLeg.position.set(1.1, 0, 0);
      rightLeg.rotation.z = Math.PI / 6; // Tilt -30 degrees
      aGroup.add(rightLeg);

      // Horizontal crossbar of the "A"
      const crossBar = createCapsule(0.4, 2);
      crossBar.position.set(0, 3, 0);
      crossBar.rotation.z = Math.PI / 2; // Make it horizontal
      aGroup.add(crossBar);
      aGroup.position.y = -0.5;
      // Add the complete "A" group to the scene
      scene.add(aGroup);

      //   aGroup.scale = 0.5
      // 5. Animation Loop
      function animate() {
        requestAnimationFrame(animate);

        // crossBar.rotation.y += 0.001;

        renderer.render(scene, camera);
      }

      // 6. Handle window resizing
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Start the animation
      animate();
    </script>
    <div id="scene"></div>
  </body>
</html>
