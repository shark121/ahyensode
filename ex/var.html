<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

        #style-switcher-ui button { flex: 1; padding: 5px; cursor: pointer; }
    </style>

    <style id="dynamic-style">
        /* Default styles will be loaded here by JS */
    </style>
</head>
<body>

    <div id="style-switcher-ui">
        <h4>Select Design Variant</h4>
        <select id="variant-select" onchange="loadVariant(this.value)"></select>
        <div class="btn-group">
            <button onclick="prevVariant()">&larr; Prev</button>
            <button onclick="nextVariant()">Next &rarr;</button>
        </div>
    </div>

            <nav class="nav">

                <a href="#">Studio</a>

            </div>
            <div class="card">
                <h3>Design</h3>
                <p>UI/UX & Art Direction</p>
            </div>
            <div class="card">
                <h3>Development</h3>

            </div>
        </section>

            &copy; 2025 Agency.

        const select = document.getElementById('variant-select');
        const styleTag = document.getElementById('dynamic-style');
        let currentIndex = 0;

        variants.forEach((v, index) => {
            let option = document.createElement('option');
            option.value = index;
            option.text = v.name;
            select.appendChild(option);
        });

        function loadVariant(index) {
            currentIndex = parseInt(index);
            styleTag.innerHTML = variants[currentIndex].css;
            select.value = currentIndex;
        }

        function nextVariant() {
            let next = currentIndex + 1;
            if (next >= variants.length) next = 0;
            loadVariant(next);
        }

        function prevVariant() {
            let prev = currentIndex - 1;
            if (prev < 0) prev = variants.length - 1;
            loadVariant(prev);
        }

        loadVariant(10); // Start showing the new rich variants immediately
