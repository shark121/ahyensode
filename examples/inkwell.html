<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inkwell Style Liquid Scroll</title>
    <style>
        body {
            margin: 0;
            background-color: #000; /* Dark background like ink */
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Canvas behind content */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }

        /* Spacer to allow scrolling */
        .content-spacer {
            height: 300vh; /* 3 pages worth of scroll */
        }

        /* Floating Text Content */
        .text-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            mix-blend-mode: difference; /* Cool effect over the ink */
        }

        h1 {
            font-size: 8vw;
            margin: 0;
            line-height: 1;
            font-weight: 300;
            letter-spacing: -0.05em;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <canvas id="gl"></canvas>
    
    <div class="text-layer">
        <h1>INKWELL</h1>
        <p>Scroll to deform reality.</p>
    </div>

    <div class="content-spacer"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Setup Scene
        const canvas = document.querySelector('#gl');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1); // 2D Fullscreen Camera

        // 2. The Shader Material (The Magic)
        // This GLSL shader creates the "liquid" noise and distorts based on scroll
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            uniform float uScroll;
            uniform vec2 uResolution;
            
            varying vec2 vUv;

            // Simplex Noise Function
            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
            float snoise(vec2 v){
                const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                        -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1;
                i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod(i, 289.0);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m ;
                m = m*m ;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            void main() {
                vec2 uv = vUv;
                
                // Aspect Ratio Correction
                float aspect = uResolution.x / uResolution.y;
                vec2 noiseUV = uv;
                noiseUV.x *= aspect;

                // Create organic flow (ink) movement
                float noise = snoise(noiseUV * 3.0 + uTime * 0.1 + uScroll * 2.0);
                
                // Distort the UVs based on noise and scroll
                float distortion = noise * uScroll * 0.5;
                
                // Create a "wave" of color
                // Mixing a dark grey (ink) with black
                vec3 color1 = vec3(0.1, 0.1, 0.12); // Dark Ink
                vec3 color2 = vec3(0.9, 0.9, 0.85); // Paper White
                
                // The "Edge" of the ink
                float mask = smoothstep(0.4, 0.6, uv.y + distortion - uScroll);
                
                vec3 finalColor = mix(color1, color2, mask);

                // Add grain
                float grain = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
                finalColor += grain * 0.05;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uScroll: { value: 0 },
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            }
        });

        // 3. Create Plane
        const geometry = new THREE.PlaneGeometry(2, 2);
        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // 4. Animation Loop
        let targetScroll = 0;
        let currentScroll = 0;

        function animate() {
            // Smooth Scroll Lerp (Linear Interpolation)
            targetScroll = window.scrollY / window.innerHeight;
            currentScroll += (targetScroll - currentScroll) * 0.05; // Ease factor

            // Update Uniforms
            material.uniforms.uTime.value = performance.now() / 1000;
            material.uniforms.uScroll.value = currentScroll;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
