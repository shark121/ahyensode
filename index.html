<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dawn Tribe</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link rel="stylesheet" href="./global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Estonia&family=Great+Vibes&family=Italianno&family=Kapakana:wght@300..400&family=Meow+Script&family=Monoton&family=MonteCarlo&family=Poiret+One&family=Quicksand:wght@300..700&family=Rouge+Script&family=Tangerine:wght@400;700&family=WindSong:wght@400;500&display=swap"
      rel="stylesheet"
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="./main.js"></script>
  </head>
  <body class="relative min-h-screen w-screen">
    <nav
      class="fixed top-0 h-[80px] z-[10] flex left-0 right-0 items-center justify-center p-2  "
    >
      <div class="h-full w-[20rem] bg-[rgb(174,144,80)]/10 backdrop-blur-md rounded-4xl p-2 flex items-center justify-between ">
        <div class="h-[50px] aspect-square rounded-full bg-[url('./assets/figma_logo.png')] bg-cover p-2">
            <img src="./assets/LOGOS-11.svg" alt="Figma Logo">
        </div>
        <div  class="text-amber-900">Gallery</div>
        <div class="bg-amber-400 px-6 h-[80%] rounded-4xl flex items-center justify-center text-amber-900 font-bold">Book</div>
      </div>
    </nav>

    <div class="h-[100vh] overflow-hidden relative sec1">
      <div class="absolute top-0 left-0"></div>
      <div>
        <img
          src="./assets/LOGOS-03.svg"
          alt="Dawn Tribe glyph"
          class="logo-glyph"
        />
      </div>
      <div class="">
        <ul class="bullets">
          <li>Branding</li>
          <li>Marketing</li>
          <li>Advertisement</li>
        </ul>
       </div>
       <div>
        <div class="h-[40px] aspect-square mt-2">
            <img src="./assets/LOGOS-10.svg" alt="Dawn Tribe Text Logo" class="logo-text"/>
        </div>
       </div>
    </div>
    <div class="h-[100vh] w-[100vw] bg-red-300"></div>
  </body>
