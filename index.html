<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahyensode</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F9F1E5;
            color: #3D2314;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            cursor: pointer;
            width: 100vw;
            height: 100vh;
        }

        canvas#main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* ── Background concentric circles ── */
        .bg-circles {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-circles .ring {
            position: absolute;
            border: 1px solid #7A4B31;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── UI Overlay ── */
        .ui-overlay {
            position: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        .top-left {
            position: absolute;
            top: 36px;
            left: 30px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #3D2314;
        }

        .role {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            margin-top: 4px;
        }

        .top-right {
            position: absolute;
            top: 40px;
            right: 90px;
        }

        .top-left img {
            height: 70px;
            width: auto;
        }

        .top-right a {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: 3px;
            color: #7A4B31;
            text-decoration: none;
            margin-left: 28px;
            transition: color 0.3s;
        }

        .top-right a:hover {
            color: #D99F36;
        }

        /* ── Interaction hint ── */
        .hint {
            position: fixed;
            bottom: 36px;
            left: 44px;
            z-index: 10;
            font-size: 0.48rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            pointer-events: none;
        }

        /* ── Typewriter cursor ── */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #3D2314;
            margin-left: 2px;
            animation: blink 0.8s steps(1) infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Works Section ── */
        #works-section {
            position: fixed;
            top: 0;
            left: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 105;
            /* Boost above ui-overlay (100) */
            padding: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #works-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Nav Buttons for Works */
        .works-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            transform: translateY(-50%);
            z-index: 200;
            pointer-events: none;
        }

        .works-nav button {
            background: none;
            border: none;
            color: #3D2314;
            font-size: 2rem;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.3s, color 0.3s;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
        }

        .works-nav button:hover {
            transform: scale(1.2);
            color: #D99F36;
        }

        /* Work Label */
        .work-current-label {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #3D2314;
        }

        .work-current-label h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .work-current-label p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7A4B31;
        }

        .back-btn {
            margin-top: 50px;
            padding: 5px 30px;
            background: #3D2314;
            color: #F9F1E5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* ── Call To Action Button ── */
        .bottom-center {
            display: flex;
            justify-content: center;
            margin-top: auto;
            margin-bottom: 5vh;
            width: 100%;
            pointer-events: none;
        }

        .cta-btn {
            font-size: 0.9rem;
            font-weight: 600;
            color: #3D2314;
            padding: 12px 32px;
            background-color: #D99F36;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, background-color 0.3s;
            pointer-events: auto;
            box-shadow: 0 8px 16px rgba(217, 159, 54, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            background-color: #e5ad47;
        }

        /* Helper to hide UI during transition */
        .hidden-ui {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #loading-screen img {
            width: 150px;
            height: auto;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .top-left {
                top: 20px;
                left: 20px;
            }

            .top-left img {
                height: 32px;
            }

            .top-right a {
                font-size: 0.85rem;
                letter-spacing: 2px;
                margin-left: 16px;
            }

            .top-right {
                top: 20px;
                right: 20px;
            }

            .logo {
                font-size: 1rem;
            }

            .role {
                font-size: 0.45rem;
                letter-spacing: 3px;
            }

            .ui-overlay {
                padding: 0;
            }

            .hero-text {
                margin-top: 0 !important;
                padding-right: 5%;
                padding-bottom: 100px;
            }

            .hero-text h1 {
                font-size: 2rem !important;
                min-height: 3rem !important;
            }

            .hero-text p {
                font-size: 0.85rem !important;
            }

            .hero-text br {
                display: none;
            }

            #works-section {
                padding: 60px 20px;
            }

            .work-current-label {
                bottom: 15%;
            }

            .work-current-label h2 {
                font-size: 1.4rem;
            }

            .work-current-label p {
                font-size: 0.75rem;
            }

            .works-nav button {
                font-size: 1.5rem;
            }

            .stage-label {
                bottom: 20px;
                font-size: 0.4rem;
                letter-spacing: 4px;
            }

            .progress-dots {
                bottom: 20px;
                right: 20px;
            }

            .hint {
                bottom: 20px;
                left: 20px;
                font-size: 0.4rem;
            }

            .back-btn {
                margin-top: 30px;
                padding: 8px 24px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .top-left {
                top: 16px;
                left: 16px;
            }

            .top-left img {
                height: 28px;
            }

            .top-right a {
                font-size: 0.75rem;
                letter-spacing: 1.5px;
                margin-left: 12px;
            }

            .top-right {
                top: 16px;
                right: 16px;
            }

            .hero-text {
                margin-top: 100px !important;
                gap: 12px !important;
            }

            .hero-text h1 {
                font-size: 1.6rem !important;
                min-height: 2.5rem !important;
            }

            .hero-text p {
                font-size: 0.78rem !important;
                line-height: 1.5;
            }

            .hero-text .cta-btn {
                width: 170px !important;
                font-size: 0.85rem !important;
            }

            #works-section {
                padding: 50px 16px;
            }

            .works-nav {
                padding: 0 3%;
            }

            .works-nav button {
                font-size: 1.2rem;
            }

            .work-current-label {
                bottom: 12%;
            }

            .work-current-label h2 {
                font-size: 1.1rem;
            }

            .work-current-label p {
                font-size: 0.65rem;
            }

            .progress-dots {
                bottom: 16px;
                right: 16px;
                gap: 6px;
            }

            .progress-dots .dot {
                width: 5px;
                height: 5px;
            }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->

    <!-- Background concentric circles -->
    <div class="bg-circles" id="bgCircles" style="opacity: 0; transition: opacity 1.5s ease;"></div>

    <!-- UI overlay -->
    <div class="ui-overlay" id="uiOverlay" style="opacity: 0; transition: opacity 1.5s ease;">
        <div class="top-left">
            <img src="assets/LOGOS-03.png" alt="Ahyensode Logo">
        </div>
        <div class="top-right">
            <a href="#" id="navWorks">works</a>
            <a href="about.html">about us</a>
            <a href="#">blog</a>
        </div>

        <div class="bottom-center">
            <a href="http://Calendly.com/ahyensode" class="cta-btn">
                Book Appointment
            </a>
        </div>
    </div>

    <!-- Works Section -->
    <div id="works-section">
        <div class="top-left" style="position: absolute; top: 36px; left: 44px; pointer-events: auto;">
            <a href="#" id="backNavLink"
                style="color: #3D2314; text-decoration: none; font-size: 1rem; letter-spacing: 3px; text-transform: lowercase;">back</a>
        </div>

        <div class="works-nav">
            <button id="prevWork">&larr;</button>
            <button id="nextWork">&rarr;</button>
        </div>

        <div class="work-current-label">
            <h2 id="workTitle">Loading...</h2>
            <p id="workCategory">Web Design</p>
        </div>
    </div>



    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ═══════════════════════════════════════════
        //  CONFIGURATION
        // ═══════════════════════════════════════════
        const isMobile = window.innerWidth <= 768;
        const PARTICLE_COUNT = isMobile ? 15000 : 40000;
        const TRANSITION_DURATION = 3.0;
        const AUTO_PLAY_INTERVAL = 10.0;
        const TEXT_DELAY = 2.0;

        // ═══════════════════════════════════════════
        //  CONCENTRIC CIRCLES BACKGROUND
        // ═══════════════════════════════════════════
        (function createCircles() {
            const container = document.getElementById('bgCircles');
            const sizes = [120, 220, 340, 480, 640, 820, 1020];
            sizes.forEach(s => {
                const ring = document.createElement('div');
                ring.className = 'ring';
                ring.style.width = s + 'px';
                ring.style.height = s + 'px';
                container.appendChild(ring);
            });
            // Slow drift animation
            gsap.to(container, {
                rotation: 360,
                duration: 120,
                repeat: -1,
                ease: 'none'
            });
            gsap.to(container, {
                x: 20, y: 15,
                duration: 8,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut'
            });
        })();

        // ═══════════════════════════════════════════
        //  THREE.JS SETUP
        // ═══════════════════════════════════════════
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.z = 14;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setClearColor(0xffffff, 0);
        renderer.domElement.id = 'main-canvas';
        document.body.prepend(renderer.domElement);

        // ── Render targets for post-processing ──
        const rtA = new THREE.WebGLRenderTarget(innerWidth * Math.min(devicePixelRatio, 2), innerHeight * Math.min(devicePixelRatio, 2));

        // ── Post-processing scene (chromatic aberration) ──
        const ppScene = new THREE.Scene();
        const ppCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const ppMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null },
                uIntensity: { value: 0.0 },
                uTime: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uIntensity;
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    vec2 dir = vUv - vec2(0.5);
                    float dist = length(dir);
                    float offset = uIntensity * (0.008 + 0.004 * sin(uTime * 8.0));
                    float r = texture2D(tDiffuse, vUv + dir * offset).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * offset).b;
                    float a = texture2D(tDiffuse, vUv).a;
                    // Scanline / static noise
                    float noise = fract(sin(dot(vUv * uTime * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                    float scanline = 1.0 - 0.04 * uIntensity * sin(vUv.y * 800.0 + uTime * 10.0);
                    gl_FragColor = vec4(r * scanline, g * scanline, b * scanline, a) + vec4(noise * 0.015 * uIntensity);
                }
            `,
            transparent: true
        });
        const ppQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat);
        ppScene.add(ppQuad);

        // ═══════════════════════════════════════════
        //  MOSAIC TILE TEXTURE (square with gap border)
        // ═══════════════════════════════════════════
        function createNoiseSprite() {
            const size = 64;
            const gap = 3; // pixel border gap for mosaic look
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const px = (i / 4) % size;
                const py = Math.floor((i / 4) / size);
                // Square tile with gap border (mosaic grout)
                const inTile = px >= gap && px < size - gap && py >= gap && py < size - gap;
                if (inTile) {
                    imgData.data[i] = 255;
                    imgData.data[i + 1] = 255;
                    imgData.data[i + 2] = 255;
                    imgData.data[i + 3] = 255;
                } else {
                    imgData.data[i] = 0;
                    imgData.data[i + 1] = 0;
                    imgData.data[i + 2] = 0;
                    imgData.data[i + 3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        const spriteTex = createNoiseSprite();

        // ═══════════════════════════════════════════
        //  PARTICLE MATERIAL (custom shader)
        // ═══════════════════════════════════════════
        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSprite: { value: spriteTex },
                uSize: { value: 16.0 * Math.min(devicePixelRatio, 2) },
                uOpacity: { value: 0.0 } // Start hidden
            },
            vertexShader: `
                attribute vec3 aColor;
                varying vec3 vColor;
                uniform float uSize;
                uniform float uTime;
                void main() {
                    vColor = aColor;
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    // Scale size by distance
                    gl_PointSize = uSize * (2.0 / -mv.z);
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform sampler2D uSprite;
                uniform float uTime;
                uniform float uOpacity; // Added uniform
                varying vec3 vColor;
                void main() {
                    vec4 sprite = texture2D(uSprite, gl_PointCoord);
                    if (sprite.a < 0.1) discard;

                    // Add subtle flicker
                    float flicker = 0.9 + 0.1 * sin(uTime * 10.0 + gl_PointCoord.x * 10.0);
                    gl_FragColor = vec4(vColor * flicker, sprite.a * uOpacity); // Use uOpacity
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        // ═══════════════════════════════════════════
        //  PARTICLE GEOMETRY
        // ═══════════════════════════════════════════
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Morph system: lerp between prevTargets and nextTargets
        const prevTargets = new Float32Array(PARTICLE_COUNT * 3);
        const nextTargets = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        // Per-particle random delay offsets for staggered morphing
        const staggerOffsets = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            staggerOffsets[i] = Math.random();
        }

        // Initialize to loading spinner sphere
        function generateSphere(count, radius) {
            const arr = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                arr[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                arr[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                arr[i * 3 + 2] = radius * Math.cos(phi);
            }
            return arr;
        }

        // Initialize as hidden scattered cloud
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            colors[i * 3] = 0.5;
            colors[i * 3 + 1] = 0.5;
            colors[i * 3 + 2] = 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

        const particles = new THREE.Points(geometry, particleMat);
        scene.add(particles);

        // ═══════════════════════════════════════════
        //  FLAG MESH FOR WORKS
        // ═══════════════════════════════════════════
        // Default texture (grey)
        const defaultTexData = new Uint8Array([100, 100, 100, 255]);
        const defaultTex = new THREE.DataTexture(defaultTexData, 1, 1, THREE.RGBAFormat);
        defaultTex.needsUpdate = true;

        const flagGeom = new THREE.PlaneGeometry(12, 8, 32, 32);
        const flagMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTexture: { value: defaultTex },
                uOpacity: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                uniform float uTime;
                void main() {
                    vUv = uv;
                    vec3 pos = position;
                    // Flag wave interaction
                    float wave = sin(pos.x * 0.5 + uTime * 2.0) * 0.5 + sin(pos.y * 0.5 + uTime * 1.5) * 0.3;
                    pos.z += wave;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                uniform float uOpacity;
                varying vec2 vUv;
                void main() {
                    vec4 tex = texture2D(uTexture, vUv);
                    gl_FragColor = vec4(tex.rgb, tex.a * uOpacity);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });
        const flagMesh = new THREE.Mesh(flagGeom, flagMat);
        flagMesh.position.set(0, 0, -40); // Placed in front of camera (z=-50 looks at 0, so -40 works)
        flagMesh.scale.x = -1; // Laterally invert the images
        flagMesh.visible = false;
        scene.add(flagMesh);

        const PROXY_URL = "https://us-central1-cloud-functions-6aa84.cloudfunctions.net/proxyImage?path=";

        // Works Data
        const WORKS = [
            { img: PROXY_URL + 'AROUND%20CLOTHING%20LOGO%20BLACK%20ON%20WHITE%20SMALL.jpeg', title: 'Around', cat: '' },
            // { img: PROXY_URL + 'AROUND%20CLOTHING%20LOGO-%20WHITE%20ON%20BLACK%20SMALL.jpeg', title: 'Around Clothing', cat: '' },
            { img: PROXY_URL + 'IMG_0260.JPG', title: 'RJAE', cat: '' },
            // { img: PROXY_URL + 'IMG_0267.JPG', title: '', cat: '' },
            { img: PROXY_URL + 'IMG_1587.JPG', title: 'Daily Blendz', cat: '' },
            // { img: PROXY_URL + 'IMG_1589.JPG', title: '', cat: '' },
            // { img: PROXY_URL + 'IMG_1590.JPG', title: '', cat: '' },
            // { img: PROXY_URL + 'IMG_4671.PNG', title: '', cat: '' },
            { img: PROXY_URL + 'IMG_4673.PNG', title: 'Mpaboa Fie', cat: '' },
            // { img: PROXY_URL + 'IMG_4690.PNG', title: '', cat: '' },
            { img: PROXY_URL + 'IMG_4692.PNG', title: 'Sadarks', cat: '' },
            // { img: PROXY_URL + 'IMG_4693.PNG', title: '', cat: '' }
        ];

        let currentWorkIdx = 0;
        const workTextures = []; // loaded textures

        // Load textures
        const texLoader = new THREE.TextureLoader();
        texLoader.crossOrigin = 'anonymous';
        WORKS.forEach((w, i) => {
            texLoader.load(w.img, (tex) => {
                workTextures[i] = tex;
                if (i === 0) flagMat.uniforms.uTexture.value = tex;
            });
        });

        // DOM Elements for Works
        const workTitle = document.getElementById('workTitle');
        const workCategory = document.getElementById('workCategory');
        const prevWorkBtn = document.getElementById('prevWork');
        const nextWorkBtn = document.getElementById('nextWork');

        function updateWorkDisplay(idx) {
            currentWorkIdx = idx;
            const w = WORKS[idx];

            // Text transition
            gsap.to([workTitle, workCategory], {
                opacity: 0, duration: 0.2, onComplete: () => {
                    workTitle.textContent = w.title;
                    workCategory.textContent = w.cat;
                    gsap.to([workTitle, workCategory], { opacity: 1, duration: 0.3 });
                }
            });

            // WebGL transition
            if (workTextures[idx]) {
                const newTex = workTextures[idx];
                // Simple texture swap (could be cross-fade with 2 meshes, but swap is fine for flag)
                flagMat.uniforms.uTexture.value = newTex;
            }
        }

        prevWorkBtn.addEventListener('click', () => {
            let next = currentWorkIdx - 1;
            if (next < 0) next = WORKS.length - 1;
            updateWorkDisplay(next);
        });

        nextWorkBtn.addEventListener('click', () => {
            let next = currentWorkIdx + 1;
            if (next >= WORKS.length) next = 0;
            updateWorkDisplay(next);
        });

        // ═══════════════════════════════════════════
        //  MOUSE TRACKING
        // ═══════════════════════════════════════════
        const mouse = { x: 0, y: 0, sx: 0, sy: 0 }; // sx/sy = smoothed
        document.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        });

        // ═══════════════════════════════════════════
        //  SHAPE GENERATORS
        // ═══════════════════════════════════════════

        // 0 — Random Cloud
        function generateCloud(count) {
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 10
                );
            }
            return new Float32Array(arr);
        }

        // 1 — Image-based shape
        function generateFromImage(imgSrc, count, isCentered = false, sizeFactor = 1.0) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const maxW = 512;
                    let scale = Math.min(maxW / img.width, maxW / img.height);
                    // scale = 2
                    console.log(scale)
                    c.width = Math.floor(img.width * scale);
                    c.height = Math.floor(img.height * scale);
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    const data = ctx.getImageData(0, 0, c.width, c.height).data;

                    // Build weighted list of pixel positions
                    const candidates = [];
                    for (let y = 0; y < c.height; y++) {
                        for (let x = 0; x < c.width; x++) {
                            const idx = (y * c.width + x) * 4;
                            const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                            // Only take visible pixels
                            if (a > 20) {
                                candidates.push({ x, y, r, g, b });
                            }
                        }
                    }

                    const positions = [];
                    const cols = [];
                    const aspect = c.width / c.height;
                    // 70% of the visible height at the z=0 plane
                    const vFov = camera.fov * Math.PI / 180;
                    const visibleH = 2 * camera.position.z * Math.tan(vFov / 2);
                    const worldH = visibleH * sizeFactor;
                    const worldW = worldH * aspect;

                    // Convert 600px offset to world units
                    const visibleW = visibleH * (innerWidth / innerHeight);
                    const xOffset = (isCentered || isMobile) ? 0 : (350 / innerWidth) * visibleW;

                    for (let i = 0; i < count; i++) {
                        const cand = candidates[Math.floor(Math.random() * candidates.length)];
                        if (cand) {
                            // Map pixel x,y to world x,y (shifted 600px right)
                            const px = (cand.x / c.width - 0.5) * worldW + xOffset;
                            const py = (0.5 - cand.y / c.height) * worldH;
                            const pz = (Math.random() - 0.5) * 0.2; // slight depth
                            positions.push(px, py, pz);

                            // Color
                            cols.push(cand.r / 255, cand.g / 255, cand.b / 255);
                        } else {
                            // Fallback if not enough pixels
                            positions.push((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0);
                            cols.push(1, 1, 1);
                        }
                    }
                    resolve({ positions: new Float32Array(positions), colors: new Float32Array(cols) });
                };
                img.onerror = () => {
                    resolve({ positions: generateCloud(count), colors: new Float32Array(count * 3).fill(1) });
                };
                img.src = imgSrc;
            });
        }

        let currentShape = -2; // -2 = loading sphere, -1 = ready
        let isTransitioning = false;
        let glitchIntensity = { value: 0 };
        let morphProgress = { value: 1.0 };
        let viewState = 'hero'; // 'hero' | 'works'

        function updateTargetsFromMorph() {
            const p = morphProgress.value;
            const staggerRange = 0.35;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const offset = staggerOffsets[i] * staggerRange;
                const localP = Math.max(0, Math.min(1, (p - offset) / (1.0 - staggerRange)));
                // easeInOut
                const t = localP;
                const ep = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                targetPositions[i3] = prevTargets[i3] + (nextTargets[i3] - prevTargets[i3]) * ep;
                targetPositions[i3 + 1] = prevTargets[i3 + 1] + (nextTargets[i3 + 1] - prevTargets[i3 + 1]) * ep;
                targetPositions[i3 + 2] = prevTargets[i3 + 2] + (nextTargets[i3 + 2] - prevTargets[i3 + 2]) * ep;
            }
        }

        // ═══════════════════════════════════════════
        //  INIT & EVENTS
        // ═══════════════════════════════════════════

        const INITIAL_LOGO_URL = PROXY_URL + 'LOGOS-10%201%20(4).png';
        let initialLogoLoaded = false;

        generateFromImage(INITIAL_LOGO_URL, PARTICLE_COUNT, true).then(result => {
            initialLogoLoaded = true;

            // Set initial targets to logo
            for (let k = 0; k < PARTICLE_COUNT * 3; k++) {
                targetPositions[k] = result.positions[k];
                nextTargets[k] = result.positions[k];
                prevTargets[k] = positions[k];
                if (result.colors) {
                    geometry.attributes.aColor.array[k] = result.colors[k];
                }
            }
            geometry.attributes.aColor.needsUpdate = true;
            morphProgress.value = 0;

            // Morph from cloud to logo
            gsap.to(particleMat.uniforms.uOpacity, { value: 1.0, duration: 1.0 });
            gsap.to(morphProgress, {
                value: 1.0,
                duration: 2.5,
                ease: 'power2.out',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => {
                    currentShape = -1; // Ready
                    setTimeout(() => {
                        const ui = document.getElementById('uiOverlay');
                        const bg = document.getElementById('bgCircles');
                        if (ui) ui.style.opacity = '1';
                        if (bg) bg.style.opacity = '0.1';
                    }, 500);
                }
            });
        });



        // ── NAVIGATION LOGIC ──
        const uiOverlay = document.querySelector('.ui-overlay');
        const worksSection = document.getElementById('works-section');
        const navWorksBtn = document.getElementById('navWorks');
        const backNavLink = document.getElementById('backNavLink');

        function navigateToWorks() {
            if (viewState === 'works') return;
            viewState = 'works';

            // 1. Pause auto-play
            // autoPlayTimer.pause();

            // 2. Disperse to cloud
            isTransitioning = true;
            currentShape = -1; // No specific slide

            const cloudPos = generateCloud(PARTICLE_COUNT);

            // Set targets
            prevTargets.set(targetPositions);
            nextTargets.set(cloudPos);
            morphProgress.value = 0;

            gsap.to(morphProgress, {
                value: 1.0,
                duration: 1.5,
                ease: 'power2.inOut',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => { isTransitioning = false; }
            });

            // 3. Move Camera Deep (Warp Effect)
            gsap.to(camera.position, {
                z: -50,
                duration: 2.0,
                ease: "power2.inOut",
                onComplete: () => {
                    // Show Flag
                    flagMesh.visible = true;
                    // Reset opacity for fade in effect
                    flagMat.uniforms.uOpacity.value = 0;
                    gsap.to(flagMat.uniforms.uOpacity, { value: 1.0, duration: 0.5 });
                }
            });

            // 4. Fade UI (Out with main UI, In with Works)
            uiOverlay.classList.add('hidden-ui');

            // Fade out particles specifically, keep canvas visible for flag
            gsap.to(particleMat.uniforms.uOpacity, { value: 0, duration: 1.0, delay: 0.5 });

            // Fade in works section slightly faster to reveal it underneath
            gsap.to(worksSection, {
                opacity: 1,
                duration: 1.5,
                delay: 0.5,
                onStart: () => {
                    worksSection.style.pointerEvents = 'auto';
                    worksSection.style.zIndex = '105';
                }
            });

            // Set initial work
            updateWorkDisplay(currentWorkIdx);
        }

        function navigateToHero() {
            if (viewState === 'hero') return;
            viewState = 'hero';

            // Hide Flag
            gsap.to(flagMat.uniforms.uOpacity, { value: 0, duration: 0.5, onComplete: () => { flagMesh.visible = false; } });

            // 1. Reset Camera
            gsap.to(camera.position, {
                z: 14,
                duration: 2.0,
                ease: "power2.inOut",
                onComplete: () => {
                    // Back to logo shape
                    currentShape = -1;

                    prevTargets.set(targetPositions);
                    nextTargets.set(positions); // We could store the logo positions, but keeping it simple for now, morph to random maybe?
                    // Actually, let's keep it simple. The cloud is fine, or we can just leave it.
                }
            });

            // 2. Fade UI
            // Fade particles back in
            gsap.to(particleMat.uniforms.uOpacity, { value: 1, duration: 1.0, delay: 1.0 });

            gsap.to(worksSection, {
                opacity: 0,
                duration: 1.0,
                onComplete: () => {
                    worksSection.style.pointerEvents = 'none';
                    worksSection.style.zIndex = '90'; // Reset
                }
            });
            gsap.delayedCall(1.0, () => {
                uiOverlay.classList.remove('hidden-ui');
            });
        }

        navWorksBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToWorks();
        });

        backNavLink.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToHero();
        });
        // Remove hint hover listener


        // ═══════════════════════════════════════════
        //  ANIMATION LOOP
        // ═══════════════════════════════════════════
        const clock = new THREE.Clock();
        let autoRotation = { x: 0, y: 0 };

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            mouse.sx += (mouse.x - mouse.sx) * 0.04;
            mouse.sy += (mouse.y - mouse.sy) * 0.04;

            // Removed initial rotation for the logo
            if (currentShape !== -2) {
                autoRotation.y += (0 - autoRotation.y) * 0.05;
                autoRotation.x += (0 - autoRotation.x) * 0.05;
            }

            // const mouseWorld = new THREE.Vector3(mouse.sx * 8, mouse.sy * 5, 0);
            const posArr = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                // Physics: spring to target
                const dx = targetPositions[i3] - posArr[i3];
                const dy = targetPositions[i3 + 1] - posArr[i3 + 1];
                const dz = targetPositions[i3 + 2] - posArr[i3 + 2];

                velocities[i3] += dx * 0.03;
                velocities[i3 + 1] += dy * 0.03;
                velocities[i3 + 2] += dz * 0.03;

                // Mouse interaction
                if (viewState === 'hero' && currentShape !== -2) {
                    const mx = mouse.sx * 15;
                    const my = mouse.sy * 15;
                    const distX = posArr[i3] - mx;
                    const distY = posArr[i3 + 1] - my;
                    const distSq = distX * distX + distY * distY;

                    if (distSq < 15.0) {
                        const force = (15.0 - distSq) * 0.001; // push strength increased by 2x
                        velocities[i3] += distX * force;
                        velocities[i3 + 1] += distY * force;
                        velocities[i3 + 2] += (Math.random() - 0.5) * force;
                    }
                }

                // Noise/Drift for all shapes
                velocities[i3] += Math.sin(t + i) * 0.002;
                velocities[i3 + 1] += Math.cos(t + i * 0.5) * 0.002;

                velocities[i3] *= 0.85; // Damping
                velocities[i3 + 1] *= 0.85;
                velocities[i3 + 2] *= 0.85;

                posArr[i3] += velocities[i3];
                posArr[i3 + 1] += velocities[i3 + 1];
                posArr[i3 + 2] += velocities[i3 + 2];
            }
            geometry.attributes.position.needsUpdate = true;

            // Camera & Rendering
            particleMat.uniforms.uTime.value = t;
            flagMat.uniforms.uTime.value = t; // Update flag time

            const rotY = autoRotation.y;
            const rotX = autoRotation.x;
            particles.rotation.y = rotY;
            particles.rotation.x = rotX;

            // camera.position.x = mouse.sx * 2;
            // camera.position.y = mouse.sy * 2;
            camera.lookAt(0, 0, 0);

            // Post-processing
            ppMat.uniforms.uIntensity.value = glitchIntensity.value;
            ppMat.uniforms.uTime.value = t;

            if (glitchIntensity.value > 0.01) {
                renderer.setRenderTarget(rtA);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                ppMat.uniforms.tDiffuse.value = rtA.texture;
                renderer.render(ppScene, ppCamera);
            } else {
                renderer.render(scene, camera);
            }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            const pr = Math.min(devicePixelRatio, 2);
            rtA.setSize(innerWidth * pr, innerHeight * pr);
        });

        // Loading Screen Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, 1000);
            }
        });
    </script>
</body>
