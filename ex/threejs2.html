<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Disassembly Suite (Vol 10)</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', sans-serif; 
            height: 600vh; /* Long scroll area */
        }
        
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 0; 
        }
        
        /* UI Panel */
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 240px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            max-height: 80vh;
            overflow-y: auto;
            color: #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        h3 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: #ffaa00; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            background: #2a2a2a;
            border: 1px solid #333;
            color: #aaa;
            padding: 10px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        button:hover { background: #ffaa00; color: #000; }
        button.active { background: #ffaa00; color: #000; font-weight: bold; box-shadow: 0 0 8px rgba(255, 170, 0, 0.4); }

        #scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ffaa00;
            font-size: 12px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            mix-blend-mode: difference;
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>

    <div id="panel">
        <h3>Exploded Views</h3>
        <div class="btn-grid" id="btnList"></div>
    </div>
    
    <div id="scroll-hint">Scroll to Disassemble</div>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE ENGINE ---
        let scene, camera, renderer;
        let updateFunction = null;
        let currentGroup = null; // Holds the object being disassembled
        
        // Scroll Logic
        let scrollY = 0;
        let smoothScroll = 0;

        const models = [
            "Smartphone Stack", "Drone Motor", "Architectural House", "Layered Sphere", 
            "Cube Matrix", "Turbine Engine", "Nested Shells", "Robot Head", 
            "Floating Islands", "Server Rack"
        ];

        function init() {
            // Setup UI
            const list = document.getElementById('btnList');
            models.forEach((name, i) => {
                const b = document.createElement('button');
                b.innerText = name;
                b.onclick = () => {
                    loadModel(i+1);
                    window.scrollTo(0,0);
                };
                list.appendChild(b);
            });

            // Setup Three.js
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const amb = new THREE.AmbientLight(0x404040);
            scene.add(amb);
            const dir = new THREE.DirectionalLight(0xffffff, 2);
            dir.position.set(5, 10, 5);
            dir.castShadow = true;
            scene.add(dir);
            const fill = new THREE.PointLight(0x00aaff, 0.5);
            fill.position.set(-5, 0, 5);
            scene.add(fill);

            window.addEventListener('resize', onResize);
            window.addEventListener('scroll', onScroll);

            animate();
            loadModel(1);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onScroll() {
            const h = document.documentElement.scrollHeight - window.innerHeight;
            scrollY = window.scrollY / h;
        }

        function animate() {
            requestAnimationFrame(animate);
            // Smooth damping
            smoothScroll += (scrollY - smoothScroll) * 0.1;
            
            if(updateFunction && currentGroup) {
                // Rotate the whole view slightly for effect
                currentGroup.rotation.y = smoothScroll * 0.5; 
                updateFunction(smoothScroll);
            }
            renderer.render(scene, camera);
        }

        function clearScene() {
            if(currentGroup) {
                scene.remove(currentGroup);
                // Dispose logic (simplified)
                currentGroup.traverse(o => {
                    if(o.geometry) o.geometry.dispose();
                    if(o.material) {
                        if(Array.isArray(o.material)) o.material.forEach(m=>m.dispose());
                        else o.material.dispose();
                    }
                });
            }
            currentGroup = new THREE.Group();
            scene.add(currentGroup);
            camera.position.set(6, 4, 6);
            camera.lookAt(0, 0, 0);
        }

        window.loadModel = function(idx) {
            clearScene();
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('button')[idx-1].classList.add('active');
            
            const key = `build${idx}`;
            if(builders[key]) builders[key]();
        };

        // --- HELPER: Create a part with "Home" and "Target" positions ---
        function createPart(geometry, material, startPos, endPos) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(startPos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Store animation data
            mesh.userData = {
                start: startPos.clone(),
                end: endPos.clone()
            };
            
            currentGroup.add(mesh);
            return mesh;
        }

        // --- BUILDER FUNCTIONS ---
        const builders = {

            // 1. Smartphone Stack (Vertical Lift)
            build1: () => {
                const w = 2, h = 0.1, d = 4;
                const matBody = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2 });
                const matScreen = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.0, metalness: 0.5 });
                const matBoard = new THREE.MeshStandardMaterial({ color: 0x006600, wireframe: false });
                const matBatt = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

                // Back Case
                createPart(new THREE.BoxGeometry(w, h, d), matBody, 
                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, -2, 0));

                // Battery
                createPart(new THREE.BoxGeometry(w*0.8, h, d*0.6), matBatt, 
                    new THREE.Vector3(0, h, 0), new THREE.Vector3(0, -0.5, 0));

                // Motherboard
                createPart(new THREE.BoxGeometry(w*0.9, h, d*0.9), matBoard, 
                    new THREE.Vector3(0, h*2, 0), new THREE.Vector3(0, 0.5, 0));

                // Screen Glass
                createPart(new THREE.BoxGeometry(w, h*0.5, d), matScreen, 
                    new THREE.Vector3(0, h*3, 0), new THREE.Vector3(0, 2, 0));

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                    });
                    // Tilt the phone
                    currentGroup.rotation.z = Math.PI / 6; 
                    currentGroup.rotation.x = -Math.PI / 6;
                };
            },

            // 2. Drone Motor (Axial Explosion)
            build2: () => {
                const matMetal = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
                const matCoil = new THREE.MeshStandardMaterial({ color: 0xff8800 });
                const matProp = new THREE.MeshStandardMaterial({ color: 0x222222 });

                // Base
                createPart(new THREE.CylinderGeometry(1, 1, 0.2, 32), matMetal, 
                    new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, -3, 0));

                // Stator (Coils)
                createPart(new THREE.CylinderGeometry(0.8, 0.8, 0.8, 16), matCoil, 
                    new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, -1, 0));

                // Rotor (Magnet shell)
                const shellGeo = new THREE.CylinderGeometry(1.1, 1.1, 1, 32, 1, true);
                createPart(shellGeo, matMetal, 
                    new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 1, 0));
                // Cap for Rotor
                createPart(new THREE.CylinderGeometry(1.1, 1.1, 0.1, 32), matMetal, 
                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1.5, 0));

                // Shaft
                createPart(new THREE.CylinderGeometry(0.1, 0.1, 3, 16), matMetal, 
                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 2.5, 0));

                // Propeller
                const propGeo = new THREE.BoxGeometry(6, 0.1, 0.5);
                createPart(propGeo, matProp, 
                    new THREE.Vector3(0, 1.6, 0), new THREE.Vector3(0, 4, 0));

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        // Spin the prop if it's the top one
                        if(m.geometry.type === 'BoxGeometry') m.rotation.y += 0.1;
                    });
                };
            },

            // 3. Architectural House (Vertical & Horizontal)
            build3: () => {
                const matFloor = new THREE.MeshStandardMaterial({ color: 0x554433 });
                const matWall = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
                const matRoof = new THREE.MeshStandardMaterial({ color: 0x883333 });

                // Foundation
                createPart(new THREE.BoxGeometry(4, 0.2, 4), matFloor,
                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, -2, 0));

                // Walls (4 separate pieces)
                // Front
                createPart(new THREE.BoxGeometry(3.8, 2, 0.2), matWall,
                    new THREE.Vector3(0, 1.1, 1.9), new THREE.Vector3(0, 1.1, 4));
                // Back
                createPart(new THREE.BoxGeometry(3.8, 2, 0.2), matWall,
                    new THREE.Vector3(0, 1.1, -1.9), new THREE.Vector3(0, 1.1, -4));
                // Left
                createPart(new THREE.BoxGeometry(0.2, 2, 3.8), matWall,
                    new THREE.Vector3(-1.9, 1.1, 0), new THREE.Vector3(-4, 1.1, 0));
                // Right
                createPart(new THREE.BoxGeometry(0.2, 2, 3.8), matWall,
                    new THREE.Vector3(1.9, 1.1, 0), new THREE.Vector3(4, 1.1, 0));

                // Roof
                createPart(new THREE.ConeGeometry(3.5, 1.5, 4), matRoof,
                    new THREE.Vector3(0, 2.8, 0), new THREE.Vector3(0, 5, 0)); // Rotate cone 45 deg manually in geo usually, visually ok here

                currentGroup.children[currentGroup.children.length-1].rotation.y = Math.PI/4; // Fix roof orientation

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                    });
                };
            },

            // 4. Layered Sphere (Radial Explosion)
            build4: () => {
                const matCore = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const matMantle = new THREE.MeshStandardMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
                const matCrust = new THREE.MeshStandardMaterial({ color: 0x00aaff, wireframe: true });

                // Core
                createPart(new THREE.SphereGeometry(1, 32, 32), matCore,
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)); // Stays still

                // Mantle (Split into 2 hemispheres to show opening)
                // Top Hemi
                const hemiGeo = new THREE.SphereGeometry(1.5, 32, 16, 0, Math.PI*2, 0, Math.PI/2);
                createPart(hemiGeo, matMantle, 
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0, 2, 0));
                
                // Bottom Hemi
                const hemiGeoBot = new THREE.SphereGeometry(1.5, 32, 16, 0, Math.PI*2, Math.PI/2, Math.PI/2);
                createPart(hemiGeoBot, matMantle, 
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0, -2, 0));

                // Crust (4 quadrants)
                // We'll just use simple boxes to represent chunks flying out for simplicity
                const chunkGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                
                for(let i=0; i<8; i++) {
                    const vec = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize().multiplyScalar(2);
                    const end = vec.clone().multiplyScalar(3); // Fly outward
                    createPart(chunkGeo, matCrust, vec, end);
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        if(m.geometry.type === 'BoxGeometry') m.rotation.x = p * 2;
                    });
                };
            },

            // 5. Cube Matrix (Grid Scatter)
            build5: () => {
                const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const mat = new THREE.MeshNormalMaterial();

                // 3x3x3 grid
                for(let x=-1; x<=1; x++) {
                    for(let y=-1; y<=1; y++) {
                        for(let z=-1; z<=1; z++) {
                            const start = new THREE.Vector3(x*0.55, y*0.55, z*0.55);
                            // Explode outwards based on normal
                            const dir = new THREE.Vector3(x, y, z).normalize();
                            if(dir.length() === 0) dir.set(0,1,0); // Center block
                            const end = dir.multiplyScalar(3);
                            
                            createPart(geo, mat, start, end);
                        }
                    }
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        m.rotation.set(p, p, p);
                    });
                };
            },

            // 6. Turbine Engine (Linear)
            build6: () => {
                const matBlade = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                const matShaft = new THREE.MeshStandardMaterial({ color: 0x333333 });

                // Shaft
                const shaft = createPart(new THREE.CylinderGeometry(0.2, 0.2, 6, 16), matShaft,
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0));
                shaft.rotation.z = Math.PI/2;

                // Fan Stages
                for(let i=0; i<8; i++) {
                    const radius = 1.5 - (i * 0.1);
                    const geo = new THREE.CylinderGeometry(radius, radius, 0.1, 20); // Disc representing blades
                    
                    const startX = -2.5 + (i * 0.7); // Tightly packed
                    const endX = -4 + (i * 1.5); // Spread out
                    
                    const part = createPart(geo, matBlade, 
                        new THREE.Vector3(startX, 0, 0), new THREE.Vector3(endX, 0, 0));
                    part.rotation.z = Math.PI/2;
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach((m, i) => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        if(i > 0) m.rotation.x += 0.1; // Spin blades
                    });
                };
            },

            // 7. Nested Shells (Matryoshka)
            build7: () => {
                const mat = new THREE.MeshStandardMaterial({ color: 0xff0055, wireframe: true });
                
                // 5 Layers
                for(let i=1; i<=5; i++) {
                    const geo = new THREE.BoxGeometry(i, i, i);
                    // Start: All at center
                    // End: Stacked vertically or spread X
                    const start = new THREE.Vector3(0,0,0);
                    const end = new THREE.Vector3(0, (i-1)*1.5, 0); // Lift up like a tower
                    
                    createPart(geo, mat, start, end);
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach((m, i) => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        m.rotation.y = p * (i+1); // Inner spins slower or faster
                    });
                };
            },

            // 8. Robot Head (Panels)
            build8: () => {
                const matSkull = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const matFace = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const matEye = new THREE.MeshBasicMaterial({ color: 0x00ff00 });

                // Inner Skull
                createPart(new THREE.SphereGeometry(1, 32, 32), matSkull, 
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0));

                // Face Plate
                createPart(new THREE.BoxGeometry(1.5, 2, 0.2), matFace,
                    new THREE.Vector3(0, 0, 1.1), new THREE.Vector3(0, 0, 3));

                // Left Ear Panel
                createPart(new THREE.BoxGeometry(0.2, 1, 1), matFace,
                    new THREE.Vector3(-1.1, 0, 0), new THREE.Vector3(-3, 0, 0));

                // Right Ear Panel
                createPart(new THREE.BoxGeometry(0.2, 1, 1), matFace,
                    new THREE.Vector3(1.1, 0, 0), new THREE.Vector3(3, 0, 0));

                // Top Panel
                createPart(new THREE.BoxGeometry(1.5, 0.2, 1.5), matFace,
                    new THREE.Vector3(0, 1.1, 0), new THREE.Vector3(0, 3, 0));

                // Eyes
                createPart(new THREE.SphereGeometry(0.2), matEye,
                    new THREE.Vector3(-0.4, 0.2, 1), new THREE.Vector3(-0.4, 0.2, 2));
                createPart(new THREE.SphereGeometry(0.2), matEye,
                    new THREE.Vector3(0.4, 0.2, 1), new THREE.Vector3(0.4, 0.2, 2));

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                    });
                };
            },

            // 9. Floating Islands (Terrain)
            build9: () => {
                const matDirt = new THREE.MeshStandardMaterial({ color: 0x554433, flatShading: true });
                const matGrass = new THREE.MeshStandardMaterial({ color: 0x44aa44, flatShading: true });

                // Create a stack of irregular chunks
                for(let i=0; i<5; i++) {
                    const r = 2 - (i*0.3);
                    const geo = new THREE.CylinderGeometry(r*0.8, r, 0.5, 7);
                    
                    const startY = -2 + i*0.5; // Compressed
                    const endY = -4 + i*2.5; // Floating apart
                    
                    createPart(geo, i===4 ? matGrass : matDirt, 
                        new THREE.Vector3(0, startY, 0), new THREE.Vector3(0, endY, 0));
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach((m, i) => {
                        m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        m.rotation.y = p * 0.5; // Slow spin
                        // Add some bobbing?
                        m.position.y += Math.sin(Date.now()*0.001 + i)*0.05 * p; 
                    });
                };
            },

            // 10. Server Rack (Slide out)
            build10: () => {
                const matRack = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const matServer = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const matLight = new THREE.MeshBasicMaterial({ color: 0x00ff00 });

                // Frame
                const frame = createPart(new THREE.BoxGeometry(2.2, 4.2, 2.2), matRack,
                    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0));
                frame.material.wireframe = true;

                // Servers
                for(let i=0; i<8; i++) {
                    const y = 1.5 - (i * 0.5);
                    const server = createPart(new THREE.BoxGeometry(2, 0.4, 2), matServer,
                        new THREE.Vector3(0, y, 0), new THREE.Vector3(0, y, 2 + (i%2)*2)); // Slide forward staggered
                    
                    // Add blinky light
                    const light = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), matLight);
                    light.position.set(0.8, 0, 1); // Front of server
                    server.add(light);
                }

                updateFunction = (p) => {
                    currentGroup.children.forEach(m => {
                        if(m.geometry.type === 'BoxGeometry' && !m.material.wireframe) {
                            m.position.lerpVectors(m.userData.start, m.userData.end, p);
                        }
                    });
                };
            }
        };

        init();
    </script>
</body>
</html>
