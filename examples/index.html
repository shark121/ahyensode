<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magician's Transformation - Side Hands</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow-x: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        .scroll-container {
            height: 400vh;
            position: relative;
            z-index: 2;
        }

        .overlay {
            position: fixed;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
            color: #ffffff;
            font-family: 'Courier New', monospace;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: exclusion;
        }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; }
        p { font-size: 1.2rem; opacity: 0.7; margin-top: 10px; }
        
        .scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: monospace;
            animation: bounce 2s infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div class="scroll-container"></div>
    
    <div class="overlay">
        <h1>Presto!</h1>
        <p>Scroll to perform the illusion</p>
    </div>
    <div class="scroll-hint">SCROLL DOWN</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 15, 60);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Moved back slightly to view horizontal width better
        camera.position.set(0, 0, 15); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const mainLight = new THREE.SpotLight(0xffffff, 2);
        mainLight.position.set(5, 10, 5);
        mainLight.angle = Math.PI / 4;
        mainLight.penumbra = 0.5;
        mainLight.castShadow = true;
        scene.add(mainLight);

        const blueRim = new THREE.DirectionalLight(0x0088ff, 2);
        blueRim.position.set(-5, 2, -5);
        scene.add(blueRim);

        // 3. MATERIALS
        const handMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.5 });
        const jointMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.8 });
        const planeMat = new THREE.MeshStandardMaterial({ color: 0xaaccff, roughness: 0.6, metalness: 0.2 });
        const droneMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.2, metalness: 0.8, emissive: 0x550000, emissiveIntensity: 0.2 });


        // 4. BUILDERS (Same as before)

        function createHand(curlDirection = 1) {
            const handGroup = new THREE.Group();
            const palm = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 2.8), handMat);
            palm.castShadow = true;
            handGroup.add(palm);

            function createFinger(xOffset, length) {
                const finger = new THREE.Group();
                finger.position.set(xOffset, 0, 1.4);
                finger.add(new THREE.Mesh(new THREE.SphereGeometry(0.35), jointMat));
                const p1Geo = new THREE.CylinderGeometry(0.3, 0.25, length/2).rotateX(Math.PI/2).translate(0, 0, length/4);
                finger.add(new THREE.Mesh(p1Geo, handMat));
                const k2 = new THREE.Mesh(new THREE.SphereGeometry(0.3), jointMat); k2.position.z = length/2; finger.add(k2);
                const p2Geo = new THREE.CylinderGeometry(0.25, 0.2, length/2.5).rotateX(Math.PI/2).translate(0, 0, length/5);
                const p2 = new THREE.Mesh(p2Geo, handMat); p2.position.z = length/2; finger.add(p2);
                return finger;
            }

            const f1 = createFinger(-0.9, 2.0); const f2 = createFinger(-0.3, 2.2);
            const f3 = createFinger(0.3, 2.1); const f4 = createFinger(0.9, 1.8);
            const curl = 0.5 * curlDirection;
            [f1, f2, f3, f4].forEach(f => { f.rotation.x = curl; handGroup.add(f); });
            const thumb = createFinger(1.4, 1.5);
            thumb.position.set(1.4, 0, 0.5); thumb.rotation.y = -0.5; thumb.rotation.x = curl;
            handGroup.add(thumb);
            return handGroup;
        }

        function createBiplane() {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.BoxGeometry(1, 1, 4), planeMat));
            const wingGeo = new THREE.BoxGeometry(6, 0.1, 1.5);
            const topWing = new THREE.Mesh(wingGeo, planeMat); topWing.position.y = 1; group.add(topWing);
            const botWing = new THREE.Mesh(wingGeo, planeMat); botWing.position.y = -0.5; group.add(botWing);
            const prop = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 0.1), jointMat); prop.position.z = 2.1; group.add(prop);
            group.userData = { prop: prop }; 
            return group;
        }

        function createDrone() {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.SphereGeometry(0.8), droneMat));
            const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 4);
            const arm1 = new THREE.Mesh(armGeo, jointMat); arm1.rotation.z = Math.PI/2; arm1.rotation.y = Math.PI/4; group.add(arm1);
            const arm2 = new THREE.Mesh(armGeo, jointMat); arm2.rotation.z = Math.PI/2; arm2.rotation.y = -Math.PI/4; group.add(arm2);
            const rotorGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.1, 3);
            group.userData.rotors = [];
            [{x: 1.4, z: 1.4}, {x: -1.4, z: -1.4}, {x: 1.4, z: -1.4}, {x: -1.4, z: 1.4}].forEach(pos => {
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.5), jointMat).position.set(pos.x, 0.2, pos.z));
                const rotor = new THREE.Mesh(rotorGeo, droneMat); rotor.position.set(pos.x, 0.5, pos.z);
                group.add(rotor); group.userData.rotors.push(rotor);
            });
            return group;
        }

        // 5. COMPOSITION

        // Left Hand
        const leftHand = createHand(1);
        leftHand.position.set(-12, 0, 0); // Start off-screen left
        // Rotate Z to orient palm towards center
        leftHand.rotation.z = -Math.PI / 2; 
        scene.add(leftHand);

        // Right Hand
        const rightHand = createHand(-1);
        rightHand.position.set(12, 0, 0); // Start off-screen right
        // Rotate Z opposite way
        rightHand.rotation.z = Math.PI / 2; 
        scene.add(rightHand);

        // The Objects Group
        const objectGroup = new THREE.Group();
        scene.add(objectGroup);

        const biplane = createBiplane();
        // Tilt plane slightly to look better against side hands
        biplane.rotation.z = 0.2; 
        objectGroup.add(biplane);

        const drone = createDrone();
        drone.scale.set(0, 0, 0);
        objectGroup.add(drone);


        // 6. ANIMATION TIMELINE (GSAP + ScrollTrigger)
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5,
            }
        });

        // STEP 1: Hands converge from SIDES to cover center
        // We use 'x' position now. +/- 1.4 is roughly where palms meet.
        tl.to(leftHand.position, { x: -1.4, duration: 2, ease: "power2.inOut" }, "cover");
        // "<" ensures right hand animates at same time as left hand
        tl.to(rightHand.position, { x: 1.4, duration: 2, ease: "power2.inOut" }, "<"); 
        
        // STEP 2: Swap & Rotate
        tl.to(biplane.scale, { x: 0, y: 0, z: 0, duration: 0.1 }, "swap");
        tl.to(drone.scale, { x: 1, y: 1, z: 1, duration: 0.1 }, "swap");

        // STEP 2.5: Z-Axis Clockwise Rotation
        // Negative value on Z axis = Clockwise. We do 2 full spins (-Math.PI * 4)
        // "swap-=0.5" starts the spin slightly before the swap happens
        tl.to(objectGroup.rotation, { z: -Math.PI * 4, duration: 1.5, ease: "power1.inOut" }, "swap-=0.5");
        
        // STEP 3: Hands retreat back to sides
        tl.to(leftHand.position, { x: -12, duration: 2, ease: "power2.inOut" }, "reveal");
        tl.to(rightHand.position, { x: 12, duration: 2, ease: "power2.inOut" }, "<");

        // STEP 4: Drone flies forward towards camera
        tl.to(drone.position, { z: 5, duration: 2, ease: "power1.out" }, "fly");


        // 7. RENDER LOOP
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Passive animations
            if (biplane.scale.x > 0) {
                biplane.userData.prop.rotation.z -= 0.2;
                biplane.position.y = Math.sin(time * 2) * 0.1;
            }

            if (drone.scale.x > 0) {
                drone.userData.rotors.forEach(r => r.rotation.y += 0.5);
                // Hover motion applied to the drone group itself
                drone.position.y = Math.sin(time * 5) * 0.05; 
                droneMat.emissiveIntensity = 0.5 + Math.sin(time * 3) * 0.3;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
