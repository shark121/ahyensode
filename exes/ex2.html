<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GUNSHIFT — Front-End Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #eee;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            cursor: pointer;
            width: 100vw;
            height: 100vh;
        }

        canvas#main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* ── Background concentric circles ── */
        .bg-circles {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-circles .ring {
            position: absolute;
            border: 1px solid #444;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── UI Overlay ── */
        .ui-overlay {
            position: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4;
            top: 0;
            left: 5%;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        .top-left {
            position: absolute;
            top: 36px;
            left: 44px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #fff;
        }

        .role {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888;
            margin-top: 4px;
        }

        .top-right {
            position: absolute;
            top: 40px;
            right: 44px;
        }

        .top-left a {
            font-size: 1rem;
            text-transform: lowercase;
            letter-spacing: 3px;
            color: #888;
            text-decoration: none;
            margin-left: 28px;
            transition: color 0.3s;
        }

        .top-right a:hover {
            color: #fff;
        }

        /* ── Stage indicator ── */
        .stage-label {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #666;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .stage-label.visible {
            opacity: 1;
        }

        /* ── Progress dots ── */
        .progress-dots {
            position: fixed;
            bottom: 36px;
            right: 44px;
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: none;
        }

        .progress-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444;
            transition: background 0.4s, transform 0.4s;
        }

        .progress-dots .dot.active {
            background: #fff;
            transform: scale(1.4);
        }

        /* ── Interaction hint ── */
        .hint {
            position: fixed;
            bottom: 36px;
            left: 44px;
            z-index: 10;
            font-size: 0.48rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #666;
            pointer-events: none;
        }

        /* ── Typewriter cursor ── */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #222;
            margin-left: 2px;
            animation: blink 0.7s steps(1) infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Works Section ── */
        #works-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 101;
            padding: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.0s ease;
        }

        #works-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        .works-header {
            text-align: center;
            margin-bottom: 40px;
            color: #222;
        }

        .works-header h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .works-grid {
            display: flex;
            gap: 40px;
            perspective: 1000px;
        }

        .work-item {
            width: 250px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .work-item:hover {
            transform: translateY(-10px);
        }

        .work-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        .work-item h3 {
            font-size: 1.2rem;
            color: #444;
        }

        .back-btn {
            margin-top: 50px;
            padding: 10px 30px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* Helper to hide UI during transition */
        .hidden-ui {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>

<body>
    <!-- Background concentric circles -->
    <div class="bg-circles" id="bgCircles"></div>

    <!-- UI overlay -->
    <div class="ui-overlay">
        <div class="top-left">
            <a href="#">top</a>

        <div class="hero-text" style="margin-top: 200px; display: flex; flex-direction: column; gap: 20px; ">

    <!-- Works Section -->
    <div id="works-section">
        <div class="works-header">
            <h2>Select Projects</h2>

        </div>
        <div class="works-grid">
            <div class="work-item">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400" alt="Project 1">

            </div>

            </div>
            <div class="work-item">

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ═══════════════════════════════════════════
        //  CONFIGURATION
        // ═══════════════════════════════════════════
        const PARTICLE_COUNT = 40000;
        const TRANSITION_DURATION = 3.0;
        const AUTO_PLAY_INTERVAL = 10.0;
        const TEXT_DELAY = 2.0;

        // ═══════════════════════════════════════════
        //  CONCENTRIC CIRCLES BACKGROUND
        // ═══════════════════════════════════════════
        (function createCircles() {
            const container = document.getElementById('bgCircles');
            const sizes = [120, 220, 340, 480, 640, 820, 1020];
            sizes.forEach(s => {
                const ring = document.createElement('div');
                ring.className = 'ring';
                ring.style.width = s + 'px';
                ring.style.height = s + 'px';
                container.appendChild(ring);
            });
            // Slow drift animation
            gsap.to(container, {
                rotation: 360,
                duration: 120,
                repeat: -1,
                ease: 'none'
            });
            gsap.to(container, {
                x: 20, y: 15,
                duration: 8,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut'
            });
        })();

        // ═══════════════════════════════════════════
        //  THREE.JS SETUP
        // ═══════════════════════════════════════════
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.z = 14;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setClearColor(0xffffff, 1);
        renderer.domElement.id = 'main-canvas';
        document.body.prepend(renderer.domElement);

        // ── Render targets for post-processing ──
        const rtA = new THREE.WebGLRenderTarget(innerWidth * Math.min(devicePixelRatio, 2), innerHeight * Math.min(devicePixelRatio, 2));

        // ── Post-processing scene (chromatic aberration) ──
        const ppScene = new THREE.Scene();
        const ppCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const ppMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null },
                uIntensity: { value: 0.0 },
                uTime: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uIntensity;
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    vec2 dir = vUv - vec2(0.5);
                    float dist = length(dir);
                    float offset = uIntensity * (0.008 + 0.004 * sin(uTime * 8.0));
                    float r = texture2D(tDiffuse, vUv + dir * offset).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * offset).b;
                    float a = texture2D(tDiffuse, vUv).a;
                    // Scanline / static noise
                    float noise = fract(sin(dot(vUv * uTime * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                    float scanline = 1.0 - 0.04 * uIntensity * sin(vUv.y * 800.0 + uTime * 10.0);
                    gl_FragColor = vec4(r * scanline, g * scanline, b * scanline, a) + vec4(noise * 0.015 * uIntensity);
                }
            `,
            transparent: true
        });
        const ppQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat);
        ppScene.add(ppQuad);

        // ═══════════════════════════════════════════
        //  MOSAIC TILE TEXTURE (square with gap border)
        // ═══════════════════════════════════════════
        function createNoiseSprite() {
            const size = 64;
            const gap = 3; // pixel border gap for mosaic look
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const px = (i / 4) % size;
                const py = Math.floor((i / 4) / size);
                // Square tile with gap border (mosaic grout)
                const inTile = px >= gap && px < size - gap && py >= gap && py < size - gap;
                if (inTile) {
                    imgData.data[i] = 255;
                    imgData.data[i + 1] = 255;
                    imgData.data[i + 2] = 255;
                    imgData.data[i + 3] = 255;
                } else {
                    imgData.data[i] = 0;
                    imgData.data[i + 1] = 0;
                    imgData.data[i + 2] = 0;
                    imgData.data[i + 3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        const spriteTex = createNoiseSprite();

        // ═══════════════════════════════════════════
        //  PARTICLE MATERIAL (custom shader)
        // ═══════════════════════════════════════════
        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSprite: { value: spriteTex },
                uSize: { value: 16.0 * Math.min(devicePixelRatio, 2) }
            },
            vertexShader: `
                attribute vec3 aColor;
                varying vec3 vColor;
                uniform float uSize;
                uniform float uTime;
                void main() {
                    vColor = aColor;
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    // Scale size by distance
                    gl_PointSize = uSize * (2.0 / -mv.z);
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform sampler2D uSprite;
                uniform float uTime;
                varying vec3 vColor;
                void main() {
                    vec4 sprite = texture2D(uSprite, gl_PointCoord);
                    if (sprite.a < 0.1) discard;

                    // Add subtle flicker
                    float flicker = 0.9 + 0.1 * sin(uTime * 10.0 + gl_PointCoord.x * 10.0);
                    gl_FragColor = vec4(vColor * flicker, sprite.a);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        // ═══════════════════════════════════════════
        //  PARTICLE GEOMETRY
        // ═══════════════════════════════════════════
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Morph system: lerp between prevTargets and nextTargets
        const prevTargets = new Float32Array(PARTICLE_COUNT * 3);
        const nextTargets = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        // Per-particle random delay offsets for staggered morphing
        const staggerOffsets = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            staggerOffsets[i] = Math.random();
        }

        // Initialize to random cloud
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 20;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

            colors[i * 3] = 0.5;
            colors[i * 3 + 1] = 0.5;
            colors[i * 3 + 2] = 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

        const particles = new THREE.Points(geometry, particleMat);
        scene.add(particles);

        // ═══════════════════════════════════════════
        //  MOUSE TRACKING
        // ═══════════════════════════════════════════
        const mouse = { x: 0, y: 0, sx: 0, sy: 0 }; // sx/sy = smoothed
        document.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        });

        // ═══════════════════════════════════════════
        //  SHAPE GENERATORS
        // ═══════════════════════════════════════════

        // 0 — Random Cloud
        function generateCloud(count) {
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 10
                );
            }
            return new Float32Array(arr);
        }

        // 1 — Image-based shape
        function generateFromImage(imgSrc, count) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const maxW = 512;
                    let scale = Math.min(maxW / img.width, maxW / img.height);
                    // scale = 2
                    console.log(scale)
                    c.width = Math.floor(img.width * scale);
                    c.height = Math.floor(img.height * scale);
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    const data = ctx.getImageData(0, 0, c.width, c.height).data;

                    // Build weighted list of pixel positions
                    const candidates = [];
                    for (let y = 0; y < c.height; y++) {
                        for (let x = 0; x < c.width; x++) {
                            const idx = (y * c.width + x) * 4;
                            const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                            // Only take visible pixels
                            if (a > 20) {
                                candidates.push({ x, y, r, g, b });
                            }
                        }
                    }

                    const positions = [];
                    const cols = [];
                    const aspect = c.width / c.height;
                    // 70% of the visible height at the z=0 plane
                    const vFov = camera.fov * Math.PI / 180;
                    const visibleH = 2 * camera.position.z * Math.tan(vFov / 2);
                    const worldH = visibleH;
                    const worldW = worldH * aspect;

                    // Convert 600px offset to world units
                    const visibleW = visibleH * (innerWidth / innerHeight);
                    const xOffset = (350 / innerWidth) * visibleW;

                    for (let i = 0; i < count; i++) {
                        const cand = candidates[Math.floor(Math.random() * candidates.length)];
                        if (cand) {
                            // Map pixel x,y to world x,y (shifted 600px right)
                            const px = (cand.x / c.width - 0.5) * worldW + xOffset;
                            const py = (0.5 - cand.y / c.height) * worldH;
                            const pz = (Math.random() - 0.5) * 0.2; // slight depth
                            positions.push(px, py, pz);

                            // Color
                            cols.push(cand.r / 255, cand.g / 255, cand.b / 255);
                        } else {
                            // Fallback if not enough pixels
                            positions.push((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0);
                            cols.push(1, 1, 1);
                        }
                    }
                    resolve({ positions: new Float32Array(positions), colors: new Float32Array(cols) });
                };
                img.onerror = () => {
                    resolve({ positions: generateCloud(count), colors: new Float32Array(count * 3).fill(1) });
                };
                img.src = imgSrc;
            });
        }

        // ═══════════════════════════════════════════
        //  SLIDES DATA (images + hero text)
        // ═══════════════════════════════════════════
        const SLIDES = [
            {
                image: 'https://i.ibb.co/9mCqwtq8/Untitled.png',
                title: 'Where strategy, design\nand technology meet',
                desc: 'We create high performance websites, web applications,\nand user interfaces using modern client-side JavaScript and thin server architecture'
            },
            {
                image: 'https://i.ibb.co/RpN2zPYn/Untitled-3.png',
                title: 'Crafting digital\nexperiences that inspire',
                desc: 'From concept to launch, we build immersive products\nthat captivate audiences and drive real business results'
            },
            {
                image: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600',
                title: 'Innovation rooted\nin precision',
                desc: 'We blend creative vision with technical excellence\nto deliver solutions that stand the test of time'
            },
            {
                image: 'https://images.unsplash.com/photo-1519125323398-675f0ddb6308?w=600',
                title: 'Elevate your brand\nwith bold design',
                desc: 'Our team transforms ideas into stunning visual narratives\nthat connect with your audience on every device'
            },
            {
                image: 'https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?w=600',
                title: 'Building the future\none pixel at a time',
                desc: 'Scalable, performant, and beautiful — we engineer\ndigital products that grow with your ambitions'
            }
        ];

        // Pre-build shapes array (one per slide)
        const shapes = SLIDES.map((slide, i) => ({
            data: null,
            colors: null,
            label: `slide ${i + 1}`,
            name: slide.title
        }));

        // ═══════════════════════════════════════════
        //  PROGRESS DOTS (auto-generated)
        // ═══════════════════════════════════════════
        const progressDotsContainer = document.getElementById('progressDots');
        SLIDES.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            progressDotsContainer.appendChild(dot);
        });

        // Initialize targets
        prevTargets.set(positions);
        nextTargets.set(positions);
        targetPositions.set(positions);

        let currentShape = -1; // start at -1 so first transition works
        let isTransitioning = false;
        let glitchIntensity = { value: 0 };
        let morphProgress = { value: 1.0 };

        // ═══════════════════════════════════════════
        //  TYPEWRITER EFFECT
        // ═══════════════════════════════════════════
        const heroTitle = document.getElementById('heroTitle');
        let typewriterTimeline = null;

        function typewriterAnimate(element, text, speed = 30) {
            return new Promise(resolve => {
                // Convert \n to <br>
                const chars = [];
                const htmlText = text.replace(/\n/g, '<br>');
                let i = 0;
                element.innerHTML = '<span class="typewriter-cursor"></span>';

                // Parse chars, treating <br> as single token
                const tokens = [];
                let j = 0;
                while (j < htmlText.length) {
                    if (htmlText.substring(j, j + 4) === '<br>') {
                        tokens.push('<br>');
                        j += 4;
                    } else {
                        tokens.push(htmlText[j]);
                        j++;
                    }
                }

                let built = '';
                function typeNext() {
                    if (i < tokens.length) {
                        built += tokens[i];
                        element.innerHTML = built + '<span class="typewriter-cursor"></span>';
                        i++;
                        setTimeout(typeNext, tokens[i - 1] === '<br>' ? speed * 3 : speed);
                    } else {
                        // Remove cursor after a short delay
                        setTimeout(() => {
                            element.innerHTML = built;
                            resolve();
                        }, 600);
                    }
                }
                typeNext();
            });
        }

        async function animateHeroText(slideIndex) {
            const slide = SLIDES[slideIndex];
            // Fade out old text
            gsap.to(heroTitle, {
                opacity: 0, duration: 0.3, onComplete: async () => {
                    gsap.set(heroTitle, { opacity: 1 });
                    // Type title
                    await typewriterAnimate(heroTitle, slide.title, 35);
                }
            });
        }

        // ═══════════════════════════════════════════
        //  TRANSITION SYSTEM
        // ═══════════════════════════════════════════
        const stageLabel = document.getElementById('stageLabel');
        const dots = progressDotsContainer.querySelectorAll('.dot');
        const hint = document.getElementById('hint');

        function setActiveDot(index) {
            const allDots = progressDotsContainer.querySelectorAll('.dot');
            allDots.forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function showStageLabel(text) {
            stageLabel.textContent = text;
            stageLabel.classList.add('visible');
            gsap.delayedCall(2, () => stageLabel.classList.remove('visible'));
        }

        function easeInOut(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function updateTargetsFromMorph() {
            const p = morphProgress.value;
            const staggerRange = 0.35;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const offset = staggerOffsets[i] * staggerRange;
                const localP = Math.max(0, Math.min(1, (p - offset) / (1.0 - staggerRange)));
                const ep = easeInOut(localP);
                targetPositions[i3] = prevTargets[i3] + (nextTargets[i3] - prevTargets[i3]) * ep;
                targetPositions[i3 + 1] = prevTargets[i3 + 1] + (nextTargets[i3 + 1] - prevTargets[i3 + 1]) * ep;
                targetPositions[i3 + 2] = prevTargets[i3 + 2] + (nextTargets[i3 + 2] - prevTargets[i3 + 2]) * ep;
            }
        }

        function transitionToShape(index) {
            if (isTransitioning || index === currentShape) return;
            isTransitioning = true;
            currentShape = index;

            const shape = shapes[index];
            if (!shape.data) {
                isTransitioning = false;
                return; // not ready yet
            }

            setActiveDot(index);
            showStageLabel(shape.label);

            // Animate hero text with typewriter effect (delayed)
            gsap.delayedCall(TEXT_DELAY, () => animateHeroText(index));

            // Glitch effect on transition
            gsap.fromTo(glitchIntensity, { value: 0 }, {
                value: 1.0, duration: 0.2, yoyo: true, repeat: 3, ease: 'power2.inOut',
                onComplete: () => gsap.to(glitchIntensity, { value: 0, duration: 0.5 })
            });

            // Set targets
            prevTargets.set(targetPositions);
            nextTargets.set(shape.data);
            morphProgress.value = 0;

            // Animate Colors
            if (shape.colors) {
                const startColors = new Float32Array(geometry.attributes.aColor.array);
                const endColors = shape.colors;
                const colorObj = { t: 0 };
                gsap.to(colorObj, {
                    t: 1,
                    duration: TRANSITION_DURATION,
                    ease: 'power1.inOut',
                    onUpdate: () => {
                        const colorArr = geometry.attributes.aColor.array;
                        const t = colorObj.t;
                        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                            colorArr[i] = startColors[i] + (endColors[i] - startColors[i]) * t;
                        }
                        geometry.attributes.aColor.needsUpdate = true;
                    }
                });
            } else {
                // Fade to default
                const startColors = new Float32Array(geometry.attributes.aColor.array);
                const colorObj = { t: 0 };
                gsap.to(colorObj, {
                    t: 1,
                    duration: TRANSITION_DURATION,
                    ease: 'power1.inOut',
                    onUpdate: () => {
                        const colorArr = geometry.attributes.aColor.array;
                        const t = colorObj.t;
                        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                            colorArr[i] = startColors[i] + (0.5 - startColors[i]) * t;
                        }
                        geometry.attributes.aColor.needsUpdate = true;
                    }
                });
            }

            gsap.to(morphProgress, {
                value: 1.0,
                duration: TRANSITION_DURATION,
                ease: 'power2.inOut',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => { isTransitioning = false; }
            });
        }

        // ═══════════════════════════════════════════
        //  INIT & EVENTS
        // ═══════════════════════════════════════════

        // Pre-load all images into shapes
        let imagesLoaded = 0;
        SLIDES.forEach((slide, i) => {
            generateFromImage(slide.image, PARTICLE_COUNT).then(result => {
                shapes[i].data = result.positions;
                shapes[i].colors = result.colors;
                imagesLoaded++;

                // Transition to first image once it's ready
                if (i === 0 && currentShape === -1) {
                    gsap.delayedCall(1.0, () => transitionToShape(0));
                }
            });
        });

        // Initialize auto-play timer
        let autoPlayTimer = gsap.delayedCall(AUTO_PLAY_INTERVAL, nextSlide);
        let viewState = 'hero'; // 'hero' | 'works'

        function nextSlide() {
            if (viewState !== 'hero') return; // Pause auto-play if not in hero view
            const next = (currentShape + 1) % SLIDES.length;
            if (shapes[next].data) {
                transitionToShape(next);
            }
            autoPlayTimer.restart(true);
        }

        // ── NAVIGATION LOGIC ──
        const uiOverlay = document.querySelector('.ui-overlay');
        const worksSection = document.getElementById('works-section');
        const navWorksBtn = document.getElementById('navWorks');
        const backToHeroBtn = document.getElementById('backToHero');

        function navigateToWorks() {
            if (viewState === 'works') return;
            viewState = 'works';

            // 1. Pause auto-play
            autoPlayTimer.pause();

            // 2. Disperse to cloud (shape 0)
            transitionToShape(0);

            // 3. Move Camera Deep (Warp Effect)
            gsap.to(camera.position, {
                z: -50,
                duration: 2.5,
                ease: "power2.inOut"
            });

            // 4. Fade UI
            uiOverlay.classList.add('hidden-ui');
            gsap.delayedCall(1.0, () => {
                worksSection.classList.add('active');
            });
        }

        function navigateToHero() {
            if (viewState === 'hero') return;
            viewState = 'hero';

            // 1. Reset Camera
            gsap.to(camera.position, {
                z: 14,
                duration: 2.0,
                ease: "power2.inOut",
                onComplete: () => {
                    // Form first image again
                    transitionToShape(1);
                    autoPlayTimer.restart(true);
                }
            });

            // 2. Fade UI
            worksSection.classList.remove('active');
            gsap.delayedCall(1.0, () => {
                uiOverlay.classList.remove('hidden-ui');
            });
        }

        navWorksBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToWorks();
        });

        backToHeroBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToHero();
        });

        // Cycle to next image on click
        document.addEventListener('click', (e) => {
            // Don't trigger on link clicks or buttons
            if (e.target.closest('a') || e.target.closest('button')) return;

            // Only allow cycling in hero view
            if (viewState === 'hero') {
                nextSlide();
            }
        });

        // Hide hint
        document.addEventListener('mousemove', function hideHint() {
            gsap.to(hint, { opacity: 0, duration: 1 });
            document.removeEventListener('mousemove', hideHint);
        }, { once: true });

        // ═══════════════════════════════════════════
        //  ANIMATION LOOP
        // ═══════════════════════════════════════════
        const clock = new THREE.Clock();
        let autoRotation = { x: 0, y: 0 };

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            mouse.sx += (mouse.x - mouse.sx) * 0.04;
            mouse.sy += (mouse.y - mouse.sy) * 0.04;

            // autoRotation.y += 0.002;
            // autoRotation.x = Math.sin(t * 0.2) * 0.1;

            const mouseWorld = new THREE.Vector3(mouse.sx * 8, mouse.sy * 5, 0);
            const posArr = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                // Physics: spring to target
                const dx = targetPositions[i3] - posArr[i3];
                const dy = targetPositions[i3 + 1] - posArr[i3 + 1];
                const dz = targetPositions[i3 + 2] - posArr[i3 + 2];

                velocities[i3] += dx * 0.03;
                velocities[i3 + 1] += dy * 0.03;
                velocities[i3 + 2] += dz * 0.03;

                // Mouse interaction
                const mx = posArr[i3] - mouseWorld.x;
                const my = posArr[i3 + 1] - mouseWorld.y;
                const mz = posArr[i3 + 2] - mouseWorld.z;
                const md = Math.sqrt(mx * mx + my * my + mz * mz);

                // Repel logic
                if (md < 4.0) {
                    const force = (4.0 - md) * 0.02;
                    velocities[i3] += (mx / md) * force * 2.5;
                }

                // Noise/Drift when in cloud mode (shape 0)
                if (currentShape === 0) {
                    velocities[i3] += Math.sin(t + i) * 0.002;
                    velocities[i3 + 1] += Math.cos(t + i * 0.5) * 0.002;
                }

                velocities[i3] *= 0.85; // Damping
                velocities[i3 + 1] *= 0.85;
                velocities[i3 + 2] *= 0.85;

                posArr[i3] += velocities[i3];
                posArr[i3 + 1] += velocities[i3 + 1];
                posArr[i3 + 2] += velocities[i3 + 2];
            }
            geometry.attributes.position.needsUpdate = true;

            // Camera & Rendering
            particleMat.uniforms.uTime.value = t;

            const rotY = autoRotation.y + mouse.sx * 0.3;
            const rotX = autoRotation.x + mouse.sy * 0.2;
            // particles.rotation.y = rotY;
            // particles.rotation.x = rotX;

            // camera.position.x = mouse.sx * 2;
            // camera.position.y = mouse.sy * 2;
            camera.lookAt(0, 0, 0);

            // Post-processing
            ppMat.uniforms.uIntensity.value = glitchIntensity.value;
            ppMat.uniforms.uTime.value = t;

            if (glitchIntensity.value > 0.01) {
                renderer.setRenderTarget(rtA);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                ppMat.uniforms.tDiffuse.value = rtA.texture;
                renderer.render(ppScene, ppCamera);
            } else {
                renderer.render(scene, camera);
            }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            const pr = Math.min(devicePixelRatio, 2);
            rtA.setSize(innerWidth * pr, innerHeight * pr);
        });
    </script>
</body>
