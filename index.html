<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahyensode</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F9F1E5;
            color: #3D2314;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            cursor: pointer;
            width: 100vw;
            height: 100vh;
        }

        canvas#main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* ── Background concentric circles ── */
        .bg-circles {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-circles .ring {
            position: absolute;
            border: 1px solid #7A4B31;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── UI Overlay ── */
        .ui-overlay {
            position: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        .top-left {
            position: absolute;
            top: 71px;
            left: 30px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #3D2314;
        }

        .role {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            margin-top: 4px;
        }

        .top-right {
            position: absolute;
            top: 71px;
            right: 90px;
            transform: translateY(-50%);
            z-index: 1001;
        }

        .top-left img {
            height: 70px;
            width: auto;
        }

        .top-right a {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: 3px;
            color: #7A4B31;
            text-decoration: none;
            margin-left: 28px;
            transition: color 0.3s;
        }

        .top-right a:hover {
            color: #D99F36;
        }

        .top-center {
            position: absolute;
            top: 71px;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1001;
            pointer-events: auto;
        }

        .top-center a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, color 0.3s;
            color: #7A4B31;
        }

        .top-center a:hover {
            transform: scale(1.1);
            color: #D99F36;
        }

        .top-center .social-svg {
            width: 24px;
            height: 24px;
            color: inherit;
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            /* Above drawer */
            pointer-events: auto;
        }

        .hamburger span {
            width: 30px;
            height: 3px;
            background: #3D2314;
            transition: 0.3s;
            border-radius: 3px;
        }

        .hamburger.open span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .mobile-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 250px;
            height: 100vh;
            background: #F9F1E5;
            display: flex;
            flex-direction: column;
            padding-top: 100px;
            padding-left: 30px;
            gap: 40px;
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1000;
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
        }

        .mobile-drawer.open {
            right: 0;
        }

        .mobile-drawer a {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: 3px;
            color: #7A4B31;
            text-decoration: none;
            transition: color 0.3s;
        }

        .mobile-drawer a:hover {
            color: #D99F36;
        }

        /* ── Interaction hint ── */
        .hint {
            position: fixed;
            bottom: 36px;
            left: 44px;
            z-index: 10;
            font-size: 0.48rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            pointer-events: none;
        }

        /* ── Typewriter cursor ── */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #3D2314;
            margin-left: 2px;
            animation: blink 0.8s steps(1) infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Works Section ── */
        #works-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 105;
            padding: 36px 44px;
            /* Same offset where top-left was located */
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #works-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Works Header (for Back Button) */
        .works-header {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            flex-shrink: 0;
            z-index: 201;
            pointer-events: auto;
        }

        /* Works Content Wrapper */
        .works-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
            min-height: 0;
            /* Unlocks native flex overflow scrolling */
        }

        /* Nav Buttons Row */
        .works-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            /* Wrap when necessary */
            gap: 10px;
            padding: 0 5%;
            z-index: 200;
            margin: auto 0;
            /* Auto margin centers it perfectly in the flex column before grid loads */
        }

        .works-nav button {
            background: none;
            border: none;
            color: #3D2314;
            font-size: 2rem;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.3s, color 0.3s;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            padding: 20px;
        }

        .works-nav button:hover {
            transform: scale(1.2);
            color: #D99F36;
        }

        /* Work Label Container */
        .work-current-label {
            text-align: center;
            z-index: 100;
            cursor: pointer;
            pointer-events: auto !important;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            flex: 1 1 auto;
            /* Allow taking available space */
            min-width: 0;
            /* Unlocks text wrapping inside flex flex blocks */
        }

        .work-current-label:hover {
            transform: scale(1.05);
        }

        .work-current-label:hover #workTitle {
            color: #D99F36 !important;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }

        #workTitle {
            font-size: clamp(0.5rem, 3.5vw, 3.5rem);
            /* Aggressively scales down to prevent any wrapping */
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #3D2314;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            position: relative;
            display: inline-block;
            white-space: nowrap;
            /* Forces text to stay on a single line */
            padding: 10px 10px;
            /* Essential for tiny mobile screens */
            pointer-events: auto !important;
            max-width: 100%;
        }

        /* Masonry Grid */
        .works-grid-wrapper {
            width: 100%;
            flex-grow: 1;
            /* Consumes remaining space beneath nav */
            min-height: 0;
            /* Unlocks native flex overflow scrolling */
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            overflow-y: auto;
            padding-bottom: 50px;
            /* Hide scrollbar */
            scrollbar-width: none;
            -ms-overflow-style: none;
            opacity: 0;
            display: none;
            /* Removed from flex flow initially */
            pointer-events: none;
        }

        .works-grid-wrapper::-webkit-scrollbar {
            display: none;
        }

        .works-grid-container {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 40px 20px;
        }

        @media (max-width: 1024px) {
            .works-grid-container {
                grid-template-columns: repeat(2, 180px);
                gap: 10px;
            }
        }

        @media (max-width: 600px) {
            .works-grid-container {
                grid-template-columns: 180px;
                gap: 10px;
            }
        }

        .grid-item {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            transition: transform 0.3s ease;
            position: relative;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
        }

        .grid-item:hover {
            transform: translateY(-5px) scale(1.05);
            z-index: 10;
        }

        .grid-item img {
            max-width: 100%;
            max-height: 180px;
            display: block;
            object-fit: contain;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            font-size: 1.2rem;
            color: #7A4B31;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .back-btn {
            margin-top: 50px;
            padding: 5px 30px;
            background: #3D2314;
            color: #F9F1E5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* ── Call To Action Button ── */
        .bottom-center {
            display: flex;
            justify-content: center;
            margin-top: auto;
            margin-bottom: 5vh;
            width: 100%;
            pointer-events: none;
        }

        .cta-btn {
            font-size: 0.9rem;
            font-weight: 600;
            color: #3D2314;
            padding: 12px 32px;
            background-color: #D99F36;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, background-color 0.3s;
            pointer-events: auto;
            box-shadow: 0 8px 16px rgba(217, 159, 54, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            background-color: #e5ad47;
        }

        /* Helper to hide UI during transition */
        .hidden-ui {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #loading-screen img {
            width: 150px;
            height: auto;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .ui-overlay .top-left {
                top: 40px;
                left: 20px;
                transform: translateY(-50%);
            }

            .ui-overlay .top-left img {
                height: 28px; /* Slightly scaled down to fit horizontal row */
            }

            .ui-overlay .top-right a {
                font-size: 0.75rem; /* Scaled down */
                letter-spacing: 1px;
                margin-left: 10px;
            }

            .ui-overlay .top-right {
                top: 40px;
                right: 20px;
                left: auto;
                transform: translateY(-50%);
            }

            .ui-overlay .top-center {
                top: 40px;
                gap: 10px; /* Reduced gap */
                transform: translate(-50%, -50%);
            }

            .ui-overlay .top-center .social-svg {
                width: 18px;
                height: 18px;
            }

            .ui-overlay .nav-links {
                display: flex; /* Kept fully visible */
                flex-direction: row;
                justify-content: flex-end;
            }

            .ui-overlay .hamburger {
                display: none;
            }

            .logo {
                font-size: 1rem;
            }

            .role {
                font-size: 0.45rem;
                letter-spacing: 3px;
            }

            .ui-overlay {
                padding: 0;
            }

            .hero-text {
                margin-top: 0 !important;
                padding-right: 5%;
                padding-bottom: 100px;
            }

            .hero-text h1 {
                font-size: 2rem !important;
                min-height: 3rem !important;
            }

            .hero-text p {
                font-size: 0.85rem !important;
            }

            .hero-text br {
                display: none;
            }

            #works-section {
                padding: 60px 20px;
            }

            .work-current-label {
                bottom: 15%;
            }

            .work-current-label h2 {
                font-size: 1.4rem;
            }

            .work-current-label p {
                font-size: 0.75rem;
            }

            .works-nav button {
                font-size: 1.5rem;
            }

            .stage-label {
                bottom: 20px;
                font-size: 0.4rem;
                letter-spacing: 4px;
            }

            .progress-dots {
                bottom: 20px;
                right: 20px;
            }

            .hint {
                bottom: 20px;
                left: 20px;
                font-size: 0.4rem;
            }

            .back-btn {
                margin-top: 30px;
                padding: 8px 24px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .ui-overlay .top-left {
                top: 30px;
                left: 10px;
                transform: translateY(-50%);
            }

            .ui-overlay .top-left img {
                height: 20px; /* Extremely small to fit 320px screens horizontally */
            }

            .ui-overlay .top-right a {
                font-size: 0.55rem;
                letter-spacing: 1px;
                margin-left: 8px;
            }

            .ui-overlay .top-right {
                top: 30px;
                right: 10px;
                left: auto;
                transform: translateY(-50%);
            }

            .ui-overlay .top-center {
                top: 30px;
                gap: 6px;
                transform: translate(-50%, -50%);
            }

            .ui-overlay .top-center .social-svg {
                width: 14px;
                height: 14px;
            }

            .hero-text {
                margin-top: 100px !important;
                gap: 12px !important;
            }

            .hero-text h1 {
                font-size: 1.6rem !important;
                min-height: 2.5rem !important;
            }

            .hero-text p {
                font-size: 0.78rem !important;
                line-height: 1.5;
            }

            .hero-text .cta-btn {
                width: 170px !important;
                font-size: 0.85rem !important;
            }

            #works-section {
                padding: 50px 16px;
            }

            .works-nav {
                padding: 0 3%;
            }

            .works-nav button {
                font-size: 1.2rem;
            }

            .work-current-label {
                bottom: 12%;
            }

            .work-current-label h2 {
                font-size: 1.1rem;
            }

            .work-current-label p {
                font-size: 0.65rem;
            }

            .progress-dots {
                bottom: 16px;
                right: 16px;
                gap: 6px;
            }

            .progress-dots .dot {
                width: 5px;
                height: 5px;
            }
        }
    </style>
</head>

        // ═══════════════════════════════════════════

        // ═══════════════════════════════════════════
        const scene = new THREE.Scene();

        // ── Render targets for post-processing ──
        const rtA = new THREE.WebGLRenderTarget(innerWidth * Math.min(devicePixelRatio, 2), innerHeight * Math.min(devicePixelRatio, 2));

        // ── Post-processing scene (chromatic aberration) ──
        const ppScene = new THREE.Scene();
        const ppCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const ppMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null },
                uIntensity: { value: 0.0 },
                uTime: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uIntensity;
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    vec2 dir = vUv - vec2(0.5);
                    float dist = length(dir);
                    float offset = uIntensity * (0.008 + 0.004 * sin(uTime * 8.0));
                    float r = texture2D(tDiffuse, vUv + dir * offset).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * offset).b;
                    float a = texture2D(tDiffuse, vUv).a;
                    // Scanline / static noise
                    float noise = fract(sin(dot(vUv * uTime * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                    float scanline = 1.0 - 0.04 * uIntensity * sin(vUv.y * 800.0 + uTime * 10.0);
                    gl_FragColor = vec4(r * scanline, g * scanline, b * scanline, a) + vec4(noise * 0.015 * uIntensity);
                }
            `,
            transparent: true
        });
        const ppQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat);
        ppScene.add(ppQuad);

        // ═══════════════════════════════════════════
        //  MOSAIC TILE TEXTURE (square with gap border)
        // ═══════════════════════════════════════════
        function createNoiseSprite() {
            const size = 64;
            const gap = 3; // pixel border gap for mosaic look
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const px = (i / 4) % size;
                const py = Math.floor((i / 4) / size);
                // Square tile with gap border (mosaic grout)
                const inTile = px >= gap && px < size - gap && py >= gap && py < size - gap;
                if (inTile) {
                    imgData.data[i] = 255;
                    imgData.data[i + 1] = 255;
                    imgData.data[i + 2] = 255;
                    imgData.data[i + 3] = 255;
                } else {
                    imgData.data[i] = 0;
                    imgData.data[i + 1] = 0;
                    imgData.data[i + 2] = 0;
                    imgData.data[i + 3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        const spriteTex = createNoiseSprite();

        // ═══════════════════════════════════════════
        //  PARTICLE MATERIAL (custom shader)
        // ═══════════════════════════════════════════
        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSprite: { value: spriteTex },
                uSize: { value: 16.0 * Math.min(devicePixelRatio, 2) },
                uOpacity: { value: 0.0 } // Start hidden
            },
            vertexShader: `
                attribute vec3 aColor;
                varying vec3 vColor;
                uniform float uSize;
                uniform float uTime;
                void main() {
                    vColor = aColor;
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    // Scale size by distance
                    gl_PointSize = uSize * (2.0 / -mv.z);
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform sampler2D uSprite;
                uniform float uTime;
                uniform float uOpacity; // Added uniform
                varying vec3 vColor;
                void main() {
                    vec4 sprite = texture2D(uSprite, gl_PointCoord);
                    if (sprite.a < 0.1) discard;

                    // Add subtle flicker
                    float flicker = 0.9 + 0.1 * sin(uTime * 10.0 + gl_PointCoord.x * 10.0);
                    gl_FragColor = vec4(vColor * flicker, sprite.a * uOpacity); // Use uOpacity
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        // ═══════════════════════════════════════════
        //  PARTICLE GEOMETRY
        // ═══════════════════════════════════════════
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Morph system: lerp between prevTargets and nextTargets
        const prevTargets = new Float32Array(PARTICLE_COUNT * 3);
        const nextTargets = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        // Per-particle random delay offsets for staggered morphing
        const staggerOffsets = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            staggerOffsets[i] = Math.random();
        }

        // Initialize to loading spinner sphere
        function generateSphere(count, radius) {
            const arr = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                arr[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                arr[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                arr[i * 3 + 2] = radius * Math.cos(phi);
            }
            return arr;
        }

        // Initialize as hidden scattered cloud
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            colors[i * 3] = 0.5;
            colors[i * 3 + 1] = 0.5;
            colors[i * 3 + 2] = 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

        const particles = new THREE.Points(geometry, particleMat);
        scene.add(particles);

        const PROXY_URL = "https://us-central1-cloud-functions-6aa84.cloudfunctions.net/proxyImage?path=";

        // Works Data Categories
        const WORK_CATEGORIES = [
            {
                id: 'logos',

                items: [
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/AROUND%20CLOTHING%20LOGO%20BLACK%20ON%20WHITE%20SMALL.jpeg?alt=media&token=05d021d6-40ff-49b6-bbad-b86b15e94bd0', title: 'Around' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/AROUND%20CLOTHING%20LOGO-%20WHITE%20ON%20BLACK%20SMALL.jpeg?alt=media&token=c5cdc9c2-3ca9-4726-9b5c-57cd08fa79ac', title: 'Around White' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_0260.JPG?alt=media&token=62ea7b50-80a3-4a68-ac83-49c2d85bacfb', title: 'RJAE' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_0267.JPG?alt=media&token=62558e11-0d0d-4843-82d7-05c73d047472', title: 'Logo 4' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_1587.JPG?alt=media&token=46c29cca-d066-4665-be20-a2492b301c19', title: 'Daily Blendz' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_1589.JPG?alt=media&token=9bba4bd3-c192-4784-b8c1-630768eb24d7', title: 'Logo 6' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_1590.JPG?alt=media&token=0b2b209a-887e-4c3b-a9d6-ce0aefb1754c', title: 'Logo 7' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_4671.PNG?alt=media&token=d0e848bc-3421-4d42-91d4-70a10ec223a0', title: 'Logo 8' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_4673.PNG?alt=media&token=7dc180ae-1e4b-4838-995d-bcfb6f945e95', title: 'Mpaboa Fie' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_4690.PNG?alt=media&token=8d21f92b-ef99-4a47-8dbf-729c67e0b999', title: 'Logo 10' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_4692.PNG?alt=media&token=434806f2-247a-4f2c-9060-81d0b8c56be6', title: 'Sadarks' },
                    { img: 'https://firebasestorage.googleapis.com/v0/b/cloud-functions-6aa84.firebasestorage.app/o/IMG_4693.PNG?alt=media&token=3cde6267-0038-491b-9980-32b13774942f', title: 'Logo 12' }
                ]
            },
            {
                id: 'animations',
                title: 'Animations',
                items: []
            },
            {
                id: 'cover_arts',
                title: 'Cover Arts',
                items: []
            },
            {
                id: 'motion_design',
                title: 'Motion Design',
                items: []
            },
            {
                id: 'flyers_and_posters',
                title: 'Flyers And Posters',
                items: []
            }
        ];

        let currentCategoryIdx = 0;

        // DOM Elements for Works
        const workTitle = document.getElementById('workTitle');
        const workLabelContainer = document.querySelector('.work-current-label');
        const prevWorkBtn = document.getElementById('prevWork');
        const nextWorkBtn = document.getElementById('nextWork');

        function updateCategoryDisplay(idx) {

            // Animate out old title
            gsap.to(workTitle, {
                opacity: 0,
                duration: 0.2,

                    workTitle.textContent = category.title;
                    gsap.to(workTitle, { opacity: 1, duration: 0.2 });
                }
            });

        function openWorksGrid(idx) {

            const category = WORK_CATEGORIES[idx];

            // Fade arrows gracefully
            gsap.to(['#prevWork', '#nextWork'], { opacity: 0, pointerEvents: 'none', duration: 0.3 });

            // Display grid in flex layout bounds
            gsap.set(gridWrapper, { display: 'block' });

            // Slide flex header row up

            // Shrink title

            // Build grid
            if (gridWrapper) gridWrapper.scrollTop = 0;
            worksGridContainer.innerHTML = '';
            if (category.items && category.items.length > 0) {
                category.items.forEach((item) => {
                    const domItem = document.createElement('div');

                    { opacity: 0, y: 30 },
                    { opacity: 1, y: 0, duration: 0.5, stagger: 0.1, delay: 0.4, ease: 'power2.out' }

        }

        function navigateBackToWorksMenu() {

            viewState = 'works_menu';

            // Fade out grid and remove from DOM flow smoothly
            gsap.to(gridWrapper, {

            gsap.to('.works-nav', { marginTop: 'auto', marginBottom: 'auto', duration: 0.6, ease: 'power2.inOut', delay: 0.2 });
            gsap.to(workTitle, { fontSize: '3.5rem', duration: 0.6, ease: 'power2.inOut', delay: 0.2 });

            // Un-fade Arrows
            gsap.to(['#prevWork', '#nextWork'], { opacity: 1, pointerEvents: 'auto', duration: 0.3, delay: 0.5 });

        prevWorkBtn.addEventListener('click', () => {

        // ═══════════════════════════════════════════
        //  MOUSE TRACKING
        // ═══════════════════════════════════════════
        const mouse = { x: -999, y: -999, sx: -999, sy: -999 }; // sx/sy = smoothed
        document.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        });

        // ═══════════════════════════════════════════
        //  SHAPE GENERATORS
        // ═══════════════════════════════════════════

        // 0 — Random Cloud
        function generateCloud(count) {
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 10
                );
            }
            return new Float32Array(arr);
        }

        // 1 — Image-based shape
        function generateFromImage(imgSrc, count, isCentered = false, sizeFactor = 1.0) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const maxW = 512;
                    let scale = Math.min(maxW / img.width, maxW / img.height);
                    // scale = 2
                    console.log(scale)
                    c.width = Math.floor(img.width * scale);
                    c.height = Math.floor(img.height * scale);
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    const data = ctx.getImageData(0, 0, c.width, c.height).data;

                    // Build weighted list of pixel positions
                    const candidates = [];
                    for (let y = 0; y < c.height; y++) {
                        for (let x = 0; x < c.width; x++) {
                            const idx = (y * c.width + x) * 4;
                            const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                            // Only take visible pixels
                            if (a > 20) {
                                candidates.push({ x, y, r, g, b });
                            }
                        }
                    }

                    const positions = [];
                    const cols = [];
                    const aspect = c.width / c.height;
                    // 70% of the visible height at the z=0 plane
                    const vFov = camera.fov * Math.PI / 180;
                    const visibleH = 2 * camera.position.z * Math.tan(vFov / 2);
                    const worldH = visibleH * sizeFactor;
                    const worldW = worldH * aspect;

                    // Convert 600px offset to world units
                    const visibleW = visibleH * (innerWidth / innerHeight);
                    const xOffset = (isCentered || isMobile) ? 0 : (350 / innerWidth) * visibleW;

                    for (let i = 0; i < count; i++) {
                        const cand = candidates[Math.floor(Math.random() * candidates.length)];
                        if (cand) {
                            // Map pixel x,y to world x,y (shifted 600px right)
                            const px = (cand.x / c.width - 0.5) * worldW + xOffset;
                            const py = (0.5 - cand.y / c.height) * worldH;
                            const pz = (Math.random() - 0.5) * 0.2; // slight depth
                            positions.push(px, py, pz);

                            // Color
                            cols.push(cand.r / 255, cand.g / 255, cand.b / 255);
                        } else {
                            // Fallback if not enough pixels
                            positions.push((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0);
                            cols.push(1, 1, 1);
                        }
                    }
                    resolve({ positions: new Float32Array(positions), colors: new Float32Array(cols) });
                };
                img.onerror = () => {
                    resolve({ positions: generateCloud(count), colors: new Float32Array(count * 3).fill(1) });
                };
                img.src = imgSrc;
            });
        }

        let currentShape = -2; // -2 = loading sphere, -1 = ready
        let isTransitioning = false;
        let glitchIntensity = { value: 0 };
        let morphProgress = { value: 1.0 };
        let viewState = 'hero'; // 'hero' | 'works'

        function updateTargetsFromMorph() {
            const p = morphProgress.value;
            const staggerRange = 0.35;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const offset = staggerOffsets[i] * staggerRange;
                const localP = Math.max(0, Math.min(1, (p - offset) / (1.0 - staggerRange)));
                // easeInOut
                const t = localP;
                const ep = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                targetPositions[i3] = prevTargets[i3] + (nextTargets[i3] - prevTargets[i3]) * ep;
                targetPositions[i3 + 1] = prevTargets[i3 + 1] + (nextTargets[i3 + 1] - prevTargets[i3 + 1]) * ep;
                targetPositions[i3 + 2] = prevTargets[i3 + 2] + (nextTargets[i3 + 2] - prevTargets[i3 + 2]) * ep;
            }
        }

        // ═══════════════════════════════════════════
        //  INIT & EVENTS
        // ═══════════════════════════════════════════

        const INITIAL_LOGO_URL = PROXY_URL + 'LOGOS-10%201%20(4).png';
        let initialLogoLoaded = false;
        let logoPositions = null;

        generateFromImage(INITIAL_LOGO_URL, PARTICLE_COUNT, true).then(result => {
            initialLogoLoaded = true;
            logoPositions = result.positions;

            // Set initial targets to logo
            for (let k = 0; k < PARTICLE_COUNT * 3; k++) {
                targetPositions[k] = result.positions[k];
                nextTargets[k] = result.positions[k];
                prevTargets[k] = positions[k];
                if (result.colors) {
                    geometry.attributes.aColor.array[k] = result.colors[k];
                }
            }
            geometry.attributes.aColor.needsUpdate = true;
            morphProgress.value = 0;

            // Initialize camera for the "fly backward" effect
            camera.position.z = -50;
            gsap.to(camera.position, {
                z: 14,
                duration: 2.0,
                ease: "power2.inOut"
            });

            // Morph from cloud to logo concurrently
            gsap.to(particleMat.uniforms.uOpacity, { value: 1.0, duration: 1.5, delay: 0.5 });
            gsap.to(morphProgress, {
                value: 1.0,
                duration: 2.0,
                ease: 'power2.inOut',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => {
                    currentShape = -1; // Ready
                    setTimeout(() => {
                        const ui = document.getElementById('uiOverlay');
                        const bg = document.getElementById('bgCircles');
                        if (ui) ui.style.opacity = '1';
                        if (bg) bg.style.opacity = '0.1';
                    }, 0);
                }
            });
        });

        // ── MOBILE DRAWER LOGIC ──
        const hamburgerBtn = document.getElementById('hamburgerMenu');
        const mobileDrawer = document.getElementById('mobileDrawer');
        const mobileNavWorks = document.getElementById('mobileNavWorks');

        if (hamburgerBtn && mobileDrawer) {
            hamburgerBtn.addEventListener('click', () => {
                hamburgerBtn.classList.toggle('open');
                mobileDrawer.classList.toggle('open');
            });

            // Close the drawer if the works link is clicked
            if (mobileNavWorks) {
                mobileNavWorks.addEventListener('click', (e) => {
                    e.preventDefault();
                    hamburgerBtn.classList.remove('open');
                    mobileDrawer.classList.remove('open');
                    if (typeof navigateToWorks === 'function') navigateToWorks();
                });
            }
        }

        // ── NAVIGATION LOGIC ──
        const uiOverlay = document.querySelector('.ui-overlay');
        const worksSection = document.getElementById('works-section');
        const navWorksBtn = document.getElementById('navWorks');
        const backNavLink = document.getElementById('backNavLink');

        function navigateToWorks() {
            if (viewState === 'works_menu' || viewState === 'works_grid') return;
            viewState = 'works_menu';

            // Ensure flex resetting is pure
            gsap.set(gridWrapper, { opacity: 0, pointerEvents: 'none', display: 'none' });
            gsap.set('.works-nav', { marginTop: 'auto', marginBottom: 'auto' });
            gsap.set(['#prevWork', '#nextWork'], { opacity: 1, pointerEvents: 'auto' });
            gsap.set(workTitle, { fontSize: '3.5rem' });

            // 1. Pause auto-play
            // autoPlayTimer.pause();

            // 2. Disperse to cloud
            isTransitioning = true;
            currentShape = -1; // No specific slide

            const cloudPos = generateCloud(PARTICLE_COUNT);

            // Set targets
            prevTargets.set(targetPositions);
            nextTargets.set(cloudPos);
            morphProgress.value = 0;

            gsap.to(morphProgress, {
                value: 1.0,
                duration: 1.5,
                ease: 'power2.inOut',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => { isTransitioning = false; }
            });

            // 3. Move Camera Deep (Warp Effect)
            gsap.to(camera.position, {
                z: -50,
                duration: 2.0,
                ease: "power2.inOut"
            });

            // 4. Fade UI (Out with main UI, In with Works)
            uiOverlay.classList.add('hidden-ui');

            // Fade out particles specifically, keep canvas visible for flag
            gsap.to(particleMat.uniforms.uOpacity, { value: 0, duration: 1.0, delay: 0.5 });

            // Fade in works section slightly faster to reveal it underneath
            gsap.to(worksSection, {
                opacity: 1,
                duration: 1.5,
                delay: 0.5,
                onStart: () => {
                    worksSection.style.pointerEvents = 'auto';
                    worksSection.style.zIndex = '105';
                }
            });

            // Set initial work
            updateCategoryDisplay(currentCategoryIdx);
        }

        function navigateToHero() {
            if (viewState === 'hero') return;
            viewState = 'hero';


            // Back to logo shape immediately
            currentShape = -1;
            if (logoPositions) {
                prevTargets.set(targetPositions);
                nextTargets.set(logoPositions);
                morphProgress.value = 0;

                gsap.to(morphProgress, {
                    value: 1.0,
                    duration: 2.0, // Match camera duration
                    ease: 'power2.inOut',
                    onUpdate: updateTargetsFromMorph
                });
            }

            // 1. Reset Camera
            gsap.to(camera.position, {
                z: 14,
                duration: 2.0,
                ease: "power2.inOut"
            });

            // 2. Fade UI
            // Fade particles back in concurrently
            gsap.to(particleMat.uniforms.uOpacity, { value: 1, duration: 1.5, delay: 0.5 });

            gsap.to(worksSection, {
                opacity: 0,
                duration: 1.0,
                onComplete: () => {
                    worksSection.style.pointerEvents = 'none';
                    worksSection.style.zIndex = '90'; // Reset
                }
            });
            gsap.delayedCall(1.0, () => {
                uiOverlay.classList.remove('hidden-ui');
            });
        }

        navWorksBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToWorks();
        });

        backNavLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (viewState === 'works_grid') {
                navigateBackToWorksMenu();
            } else {
                navigateToHero();
            }
        });
        // Remove hint hover listener


        // ═══════════════════════════════════════════
        //  ANIMATION LOOP
        // ═══════════════════════════════════════════
        const clock = new THREE.Clock();
        let autoRotation = { x: 0, y: 0 };

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            mouse.sx += (mouse.x - mouse.sx) * 0.04;
            mouse.sy += (mouse.y - mouse.sy) * 0.04;

            // Removed initial rotation for the logo
            if (currentShape !== -2) {
                autoRotation.y += (0 - autoRotation.y) * 0.05;
                autoRotation.x += (0 - autoRotation.x) * 0.05;
            }

            // const mouseWorld = new THREE.Vector3(mouse.sx * 8, mouse.sy * 5, 0);
            const posArr = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                // Physics: spring to target
                const dx = targetPositions[i3] - posArr[i3];
                const dy = targetPositions[i3 + 1] - posArr[i3 + 1];
                const dz = targetPositions[i3 + 2] - posArr[i3 + 2];

                velocities[i3] += dx * 0.03;
                velocities[i3 + 1] += dy * 0.03;
                velocities[i3 + 2] += dz * 0.03;

                // Mouse interaction
                if (viewState === 'hero' && currentShape !== -2) {
                    const mx = mouse.sx * 15;
                    const my = mouse.sy * 15;
                    const distX = posArr[i3] - mx;
                    const distY = posArr[i3 + 1] - my;
                    const distSq = distX * distX + distY * distY;

                    if (distSq < 15.0) {
                        const force = (15.0 - distSq) * 0.001; // push strength increased by 2x
                        velocities[i3] += distX * force;
                        velocities[i3 + 1] += distY * force;
                        velocities[i3 + 2] += (Math.random() - 0.5) * force;
                    }
                }

                // Noise/Drift for all shapes (subtle ambient movement)
                velocities[i3] += Math.sin(t * 0.5 + posArr[i3] * 0.3) * 0.0004;
                velocities[i3 + 1] += Math.cos(t * 0.5 + posArr[i3 + 1] * 0.3) * 0.0004;

                velocities[i3] *= 0.85; // Damping
                velocities[i3 + 1] *= 0.85;
                velocities[i3 + 2] *= 0.85;

                posArr[i3] += velocities[i3];
                posArr[i3 + 1] += velocities[i3 + 1];
                posArr[i3 + 2] += velocities[i3 + 2];
            }
            geometry.attributes.position.needsUpdate = true;

            // Camera & Rendering
            particleMat.uniforms.uTime.value = t;

            const rotY = autoRotation.y;
            const rotX = autoRotation.x;
            particles.rotation.y = rotY;
            particles.rotation.x = rotX;

            // camera.position.x = mouse.sx * 2;
            // camera.position.y = mouse.sy * 2;
            camera.lookAt(0, 0, 0);

            // Post-processing
            ppMat.uniforms.uIntensity.value = glitchIntensity.value;
            ppMat.uniforms.uTime.value = t;

            if (glitchIntensity.value > 0.01) {
                renderer.setRenderTarget(rtA);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                ppMat.uniforms.tDiffuse.value = rtA.texture;
                renderer.render(ppScene, ppCamera);
            } else {
                renderer.render(scene, camera);
            }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            const pr = Math.min(devicePixelRatio, 2);
            rtA.setSize(innerWidth * pr, innerHeight * pr);
        });

        // Loading Screen Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, 1000);
            }
        });
    </script>
</body>

</html>
