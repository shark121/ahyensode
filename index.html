<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahyensode</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F9F1E5;
            color: #3D2314;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            cursor: pointer;
            width: 100vw;
            height: 100vh;
        }

        canvas#main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* ── Background concentric circles ── */
        .bg-circles {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-circles .ring {
            position: absolute;
            border: 1px solid #7A4B31;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── UI Overlay ── */
        .ui-overlay {
            position: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4;
            top: 0;
            left: 5%;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        .top-left {
            position: absolute;
            top: 36px;
            left: 44px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #3D2314;
        }

        .role {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            margin-top: 4px;
        }

        .top-right {
            position: absolute;
            top: 40px;
            right: 44px;
        }

        .top-left a {
            font-size: 1rem;
            text-transform: lowercase;
            letter-spacing: 3px;
            color: #7A4B31;
            text-decoration: none;
            margin-left: 28px;
            transition: color 0.3s;
        }

        .top-left a:hover,
        .top-right a:hover {
            color: #D99F36;
        }

        /* ── Stage indicator ── */
        .stage-label {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #7A4B31;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .stage-label.visible {
            opacity: 1;
        }

        /* ── Progress dots ── */
        .progress-dots {
            position: fixed;
            bottom: 36px;
            right: 44px;
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: none;
        }

        .progress-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7A4B31;
            transition: background 0.4s, transform 0.4s;
        }

        .progress-dots .dot.active {
            background: #D99F36;
            transform: scale(1.4);
        }

        /* ── Interaction hint ── */
        .hint {
            position: fixed;
            bottom: 36px;
            left: 44px;
            z-index: 10;
            font-size: 0.48rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7A4B31;
            pointer-events: none;
        }

        /* ── Typewriter cursor ── */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #3D2314;
            margin-left: 2px;
            animation: blink 0.8s steps(1) infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Works Section ── */
        #works-section {
            position: fixed;
            top: 0;
            left: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 105;
            /* Boost above ui-overlay (100) */
            padding: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            background: rgba(255, 255, 255, 0.0);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #works-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Nav Buttons for Works */
        .works-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            transform: translateY(-50%);
            z-index: 200;
            pointer-events: none;
        }

        .works-nav button {
            background: none;
            border: none;
            color: #3D2314;
            font-size: 2rem;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.3s, color 0.3s;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
        }

        .works-nav button:hover {
            transform: scale(1.2);
            color: #D99F36;
        }

        /* Work Label */
        .work-current-label {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #3D2314;
        }

        .work-current-label h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .work-current-label p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7A4B31;
        }

        .back-btn {
            margin-top: 50px;
            padding: 10px 30px;
            background: #3D2314;
            color: #F9F1E5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* Helper to hide UI during transition */
        .hidden-ui {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #loading-screen img {
            width: 150px;
            height: auto;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .top-left {
                top: 20px;
                left: 20px;
            }

            .top-left a {
                font-size: 0.85rem;
                letter-spacing: 2px;
                margin-left: 16px;
            }

            .top-right {
                top: 20px;
                right: 20px;
            }

            .logo {
                font-size: 1rem;
            }

            .role {
                font-size: 0.45rem;
                letter-spacing: 3px;
            }

            .ui-overlay {
                left: 0;
                padding: 0 5%;
                justify-content: flex-end;
            }

            .hero-text {
                margin-top: 0 !important;
                padding-right: 5%;
                padding-bottom: 100px;
            }

            .hero-text h1 {
                font-size: 2rem !important;
                min-height: 3rem !important;
            }

            .hero-text p {
                font-size: 0.85rem !important;
            }

            .hero-text br {
                display: none;
            }

            #works-section {
                padding: 60px 20px;
            }

            .work-current-label {
                bottom: 15%;
            }

            .work-current-label h2 {
                font-size: 1.4rem;
            }

            .work-current-label p {
                font-size: 0.75rem;
            }

            .works-nav button {
                font-size: 1.5rem;
            }

            .stage-label {
                bottom: 20px;
                font-size: 0.4rem;
                letter-spacing: 4px;
            }

            .progress-dots {
                bottom: 20px;
                right: 20px;
            }

            .hint {
                bottom: 20px;
                left: 20px;
                font-size: 0.4rem;
            }

            .back-btn {
                margin-top: 30px;
                padding: 8px 24px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .top-left {
                top: 16px;
                left: 16px;
            }

            .top-left a {
                font-size: 0.75rem;
                letter-spacing: 1.5px;
                margin-left: 12px;
            }

            .top-right {
                top: 16px;
                right: 16px;
            }

            .hero-text {
                margin-top: 100px !important;
                gap: 12px !important;
            }

            .hero-text h1 {
                font-size: 1.6rem !important;
                min-height: 2.5rem !important;
            }

            .hero-text p {
                font-size: 0.78rem !important;
                line-height: 1.5;
            }

            .hero-text .cta-btn {
                width: 170px !important;
                font-size: 0.85rem !important;
            }

            #works-section {
                padding: 50px 16px;
            }

            .works-nav {
                padding: 0 3%;
            }

            .works-nav button {
                font-size: 1.2rem;
            }

            .work-current-label {
                bottom: 12%;
            }

            .work-current-label h2 {
                font-size: 1.1rem;
            }

            .work-current-label p {
                font-size: 0.65rem;
            }

            .progress-dots {
                bottom: 16px;
                right: 16px;
                gap: 6px;
            }

            .progress-dots .dot {
                width: 5px;
                height: 5px;
            }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->

    <!-- Background concentric circles -->
    <div class="bg-circles" id="bgCircles" style="opacity: 0; transition: opacity 1.5s ease;"></div>

    <!-- UI overlay -->
    <div class="ui-overlay" id="uiOverlay" style="opacity: 0; transition: opacity 1.5s ease;">
        <div class="top-left">
            <!-- <a href="#">top</a> -->
            <a href="#" id="navWorks">works</a>
            <!-- <a href="#">about</a> -->
            <a href="#">blog</a>
        </div>
        <!-- <div class="top-right">
            <div class="logo">Ahyensode</div>
            <div class="role">Digital Solutions</div>
        </div> -->


        <div class="hero-text"
            style="margin-top: 200px; display: flex; flex-direction: column; gap: 20px; max-width: 90%; ">
            <h1 id="heroTitle" style="font-size: 3rem; font-weight: 800; color: #3D2314; min-height: 4.5rem;"></h1>
            <p id="heroSymbol"
                style="font-size: 1rem; font-weight: 600; color: #7A4B31; text-transform: uppercase; letter-spacing: 1px; margin-top: -15px;">
            </p>
            <p id="heroDesc" style="font-size: 1rem; font-weight: 400; color: #3D2314;">We create high performance
                websites, web applications,
                and user interfaces using modern client-side
                JavaScript and thin server architecture
            </p>
            <a href="http://Calendly.com/ahyensode" class="cta-btn" style="font-size: 1rem; font-weight: 400; color: #3D2314; height: 30px; padding: 4px; 
                background-color: #D99F36; border-radius: 15px; margin-top: 10px; text-decoration: none;width: 200px; 
                display: flex;
                justify-content: center;
                align-items: center;
                ">Book
                Appointment</a>
        </div>
    </div>

    <!-- Works Section -->
    <div id="works-section">
        <div class="top-left" style="position: absolute; top: 36px; left: 44px; pointer-events: auto;">
            <a href="#" id="backNavLink"
                style="color: #3D2314; text-decoration: none; font-size: 1rem; letter-spacing: 3px; text-transform: lowercase;">back</a>
        </div>

        <div class="works-nav">
            <button id="prevWork">&larr;</button>
            <button id="nextWork">&rarr;</button>
        </div>

        <div class="work-current-label">
            <h2 id="workTitle">Loading...</h2>
            <p id="workCategory">Web Design</p>
        </div>
    </div>

    <!-- Stage label -->
    <div class="stage-label" id="stageLabel"></div>

    <!-- Progress dots -->
    <div class="progress-dots" id="progressDots"></div>

    <!-- Hint -->
    <div class="hint" id="hint">click to disperse / form</div>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ═══════════════════════════════════════════
        //  CONFIGURATION
        // ═══════════════════════════════════════════
        const isMobile = window.innerWidth <= 768;
        const PARTICLE_COUNT = isMobile ? 15000 : 40000;
        const TRANSITION_DURATION = 3.0;
        const AUTO_PLAY_INTERVAL = 10.0;
        const TEXT_DELAY = 2.0;

        // ═══════════════════════════════════════════
        //  CONCENTRIC CIRCLES BACKGROUND
        // ═══════════════════════════════════════════
        (function createCircles() {
            const container = document.getElementById('bgCircles');
            const sizes = [120, 220, 340, 480, 640, 820, 1020];
            sizes.forEach(s => {
                const ring = document.createElement('div');
                ring.className = 'ring';
                ring.style.width = s + 'px';
                ring.style.height = s + 'px';
                container.appendChild(ring);
            });
            // Slow drift animation
            gsap.to(container, {
                rotation: 360,
                duration: 120,
                repeat: -1,
                ease: 'none'
            });
            gsap.to(container, {
                x: 20, y: 15,
                duration: 8,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut'
            });
        })();

        // ═══════════════════════════════════════════
        //  THREE.JS SETUP
        // ═══════════════════════════════════════════
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.z = 14;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setClearColor(0xffffff, 0);
        renderer.domElement.id = 'main-canvas';
        document.body.prepend(renderer.domElement);

        // ── Render targets for post-processing ──
        const rtA = new THREE.WebGLRenderTarget(innerWidth * Math.min(devicePixelRatio, 2), innerHeight * Math.min(devicePixelRatio, 2));

        // ── Post-processing scene (chromatic aberration) ──
        const ppScene = new THREE.Scene();
        const ppCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const ppMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null },
                uIntensity: { value: 0.0 },
                uTime: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uIntensity;
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    vec2 dir = vUv - vec2(0.5);
                    float dist = length(dir);
                    float offset = uIntensity * (0.008 + 0.004 * sin(uTime * 8.0));
                    float r = texture2D(tDiffuse, vUv + dir * offset).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * offset).b;
                    float a = texture2D(tDiffuse, vUv).a;
                    // Scanline / static noise
                    float noise = fract(sin(dot(vUv * uTime * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                    float scanline = 1.0 - 0.04 * uIntensity * sin(vUv.y * 800.0 + uTime * 10.0);
                    gl_FragColor = vec4(r * scanline, g * scanline, b * scanline, a) + vec4(noise * 0.015 * uIntensity);
                }
            `,
            transparent: true
        });
        const ppQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat);
        ppScene.add(ppQuad);

        // ═══════════════════════════════════════════
        //  MOSAIC TILE TEXTURE (square with gap border)
        // ═══════════════════════════════════════════
        function createNoiseSprite() {
            const size = 64;
            const gap = 3; // pixel border gap for mosaic look
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const px = (i / 4) % size;
                const py = Math.floor((i / 4) / size);
                // Square tile with gap border (mosaic grout)
                const inTile = px >= gap && px < size - gap && py >= gap && py < size - gap;
                if (inTile) {
                    imgData.data[i] = 255;
                    imgData.data[i + 1] = 255;
                    imgData.data[i + 2] = 255;
                    imgData.data[i + 3] = 255;
                } else {
                    imgData.data[i] = 0;
                    imgData.data[i + 1] = 0;
                    imgData.data[i + 2] = 0;
                    imgData.data[i + 3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        const spriteTex = createNoiseSprite();

        // ═══════════════════════════════════════════
        //  PARTICLE MATERIAL (custom shader)
        // ═══════════════════════════════════════════
        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSprite: { value: spriteTex },
                uSize: { value: 16.0 * Math.min(devicePixelRatio, 2) },
                uOpacity: { value: 0.0 } // Start hidden
            },
            vertexShader: `
                attribute vec3 aColor;
                varying vec3 vColor;
                uniform float uSize;
                uniform float uTime;
                void main() {
                    vColor = aColor;
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    // Scale size by distance
                    gl_PointSize = uSize * (2.0 / -mv.z);
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform sampler2D uSprite;
                uniform float uTime;
                uniform float uOpacity; // Added uniform
                varying vec3 vColor;
                void main() {
                    vec4 sprite = texture2D(uSprite, gl_PointCoord);
                    if (sprite.a < 0.1) discard;

                    // Add subtle flicker
                    float flicker = 0.9 + 0.1 * sin(uTime * 10.0 + gl_PointCoord.x * 10.0);
                    gl_FragColor = vec4(vColor * flicker, sprite.a * uOpacity); // Use uOpacity
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        // ═══════════════════════════════════════════
        //  PARTICLE GEOMETRY
        // ═══════════════════════════════════════════
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Morph system: lerp between prevTargets and nextTargets
        const prevTargets = new Float32Array(PARTICLE_COUNT * 3);
        const nextTargets = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        // Per-particle random delay offsets for staggered morphing
        const staggerOffsets = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            staggerOffsets[i] = Math.random();
        }

        // Initialize to loading spinner sphere
        function generateSphere(count, radius) {
            const arr = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                arr[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                arr[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                arr[i * 3 + 2] = radius * Math.cos(phi);
            }
            return arr;
        }

        // Initialize as hidden scattered cloud
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            colors[i * 3] = 0.5;
            colors[i * 3 + 1] = 0.5;
            colors[i * 3 + 2] = 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

        const particles = new THREE.Points(geometry, particleMat);
        scene.add(particles);

        // ═══════════════════════════════════════════
        //  FLAG MESH FOR WORKS
        // ═══════════════════════════════════════════
        // Default texture (grey)
        const defaultTexData = new Uint8Array([100, 100, 100, 255]);
        const defaultTex = new THREE.DataTexture(defaultTexData, 1, 1, THREE.RGBAFormat);
        defaultTex.needsUpdate = true;

        const flagGeom = new THREE.PlaneGeometry(12, 8, 32, 32);
        const flagMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTexture: { value: defaultTex },
                uOpacity: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                uniform float uTime;
                void main() {
                    vUv = uv;
                    vec3 pos = position;
                    // Flag wave interaction
                    float wave = sin(pos.x * 0.5 + uTime * 2.0) * 0.5 + sin(pos.y * 0.5 + uTime * 1.5) * 0.3;
                    pos.z += wave;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                uniform float uOpacity;
                varying vec2 vUv;
                void main() {
                    vec4 tex = texture2D(uTexture, vUv);
                    gl_FragColor = vec4(tex.rgb, tex.a * uOpacity);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });
        const flagMesh = new THREE.Mesh(flagGeom, flagMat);
        flagMesh.position.set(0, 0, -40); // Placed in front of camera (z=-50 looks at 0, so -40 works)
        flagMesh.scale.x = -1; // Laterally invert the images
        flagMesh.visible = false;
        scene.add(flagMesh);

        const PROXY_URL = "https://us-central1-cloud-functions-6aa84.cloudfunctions.net/proxyImage?path=";

        // Works Data
        const WORKS = [
            { img: PROXY_URL + 'AROUND%20CLOTHING%20LOGO%20BLACK%20ON%20WHITE%20SMALL.jpeg', title: 'Around', cat: '' },

        // 0 — Random Cloud
        function generateCloud(count) {
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(
                    (Math.random() - 0.5) * 25,

        // 1 — Image-based shape
        function generateFromImage(imgSrc, count, isCentered = false, sizeFactor = 1.0) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const maxW = 512;
                    let scale = Math.min(maxW / img.width, maxW / img.height);
                    // scale = 2
                    console.log(scale)
                    c.width = Math.floor(img.width * scale);
                    c.height = Math.floor(img.height * scale);
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    const data = ctx.getImageData(0, 0, c.width, c.height).data;

                    // Build weighted list of pixel positions
                    const candidates = [];
                    for (let y = 0; y < c.height; y++) {
                        for (let x = 0; x < c.width; x++) {
                            const idx = (y * c.width + x) * 4;
                            const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                            // Only take visible pixels
                            if (a > 20) {
                                candidates.push({ x, y, r, g, b });
                            }
                        }
                    }

                    const positions = [];
                    const cols = [];
                    const aspect = c.width / c.height;
                    // 70% of the visible height at the z=0 plane
                    const vFov = camera.fov * Math.PI / 180;
                    const visibleH = 2 * camera.position.z * Math.tan(vFov / 2);
                    const worldH = visibleH * sizeFactor;
                    const worldW = worldH * aspect;

                    // Convert 600px offset to world units
                    const visibleW = visibleH * (innerWidth / innerHeight);
                    const xOffset = (isCentered || isMobile) ? 0 : (350 / innerWidth) * visibleW;

                    for (let i = 0; i < count; i++) {
                        const cand = candidates[Math.floor(Math.random() * candidates.length)];
                        if (cand) {
                            // Map pixel x,y to world x,y (shifted 600px right)
                            const px = (cand.x / c.width - 0.5) * worldW + xOffset;
                            const py = (0.5 - cand.y / c.height) * worldH;
                            const pz = (Math.random() - 0.5) * 0.2; // slight depth
                            positions.push(px, py, pz);

                            // Color
                            cols.push(cand.r / 255, cand.g / 255, cand.b / 255);
                        } else {
                            // Fallback if not enough pixels
                            positions.push((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0);
                            cols.push(1, 1, 1);
                        }
                    }
                    resolve({ positions: new Float32Array(positions), colors: new Float32Array(cols) });
                };
                img.onerror = () => {
                    resolve({ positions: generateCloud(count), colors: new Float32Array(count * 3).fill(1) });
                };
                img.src = imgSrc;
            });
        }

        function typewriterAnimate(element, text, speed = 30) {
            return new Promise(resolve => {
                // Convert \n to <br>
                const chars = [];
                const htmlText = text.replace(/\n/g, '<br>');
                let i = 0;
                element.innerHTML = '<span class="typewriter-cursor"></span>';

                // Parse chars, treating <br> as single token
                const tokens = [];
                let j = 0;
                while (j < htmlText.length) {
                    if (htmlText.substring(j, j + 4) === '<br>') {
                        tokens.push('<br>');
                        j += 4;
                    } else {
                        tokens.push(htmlText[j]);
                        j++;
                    }
                }

                let built = '';
                function typeNext() {
                    if (i < tokens.length) {
                        built += tokens[i];
                        element.innerHTML = built + '<span class="typewriter-cursor"></span>';
                        i++;
                        setTimeout(typeNext, tokens[i - 1] === '<br>' ? speed * 3 : speed);
                    } else {
                        // Remove cursor after a short delay
                        setTimeout(() => {
                            element.innerHTML = built;
                            resolve();
                        }, 600);
                    }
                }
                typeNext();
            });
        }

        const stageLabel = document.getElementById('stageLabel');

        function easeInOut(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function updateTargetsFromMorph() {
            const p = morphProgress.value;
            const staggerRange = 0.35;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const offset = staggerOffsets[i] * staggerRange;
                const localP = Math.max(0, Math.min(1, (p - offset) / (1.0 - staggerRange)));
                const ep = easeInOut(localP);
                targetPositions[i3] = prevTargets[i3] + (nextTargets[i3] - prevTargets[i3]) * ep;
                targetPositions[i3 + 1] = prevTargets[i3 + 1] + (nextTargets[i3 + 1] - prevTargets[i3 + 1]) * ep;
                targetPositions[i3 + 2] = prevTargets[i3 + 2] + (nextTargets[i3 + 2] - prevTargets[i3 + 2]) * ep;
            }
        }

            // Set targets
            prevTargets.set(targetPositions);
            nextTargets.set(shape.data);
            morphProgress.value = 0;

            // Animate Colors
            if (shape.colors) {
                const startColors = new Float32Array(geometry.attributes.aColor.array);

                const colorObj = { t: 0 };
                gsap.to(colorObj, {
                    t: 1,
                    duration: TRANSITION_DURATION,
                    ease: 'power1.inOut',
                    onUpdate: () => {
                        const colorArr = geometry.attributes.aColor.array;
                        const t = colorObj.t;
                        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                            colorArr[i] = startColors[i] + (endColors[i] - startColors[i]) * t;
                        }

                    duration: TRANSITION_DURATION,

                        const colorArr = geometry.attributes.aColor.array;
                        const t = colorObj.t;
                        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                            colorArr[i] = startColors[i] + (0.5 - startColors[i]) * t;
                        }
                        geometry.attributes.aColor.needsUpdate = true;
                    }
                });
            }

            gsap.to(morphProgress, {
                value: 1.0,
                duration: TRANSITION_DURATION,
                ease: 'power2.inOut',
                onUpdate: updateTargetsFromMorph,
                onComplete: () => { isTransitioning = false; }

            const touchEndY = e.changedTouches[0].clientY;

            const diffY = touchStartY - touchEndY;
            const diffX = touchStartX - touchEndX;

            // Only trigger on vertical swipes (not horizontal)
            if (Math.abs(diffY) > swipeThreshold && Math.abs(diffY) > Math.abs(diffX)) {

                const direction = diffY > 0 ? 1 : -1; // swipe up = next, swipe down = prev

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            mouse.sx += (mouse.x - mouse.sx) * 0.04;
            mouse.sy += (mouse.y - mouse.sy) * 0.04;

            // Removed initial rotation for the logo
            if (currentShape !== -2) {
                autoRotation.y += (0 - autoRotation.y) * 0.05;
                autoRotation.x += (0 - autoRotation.x) * 0.05;
            }

            // const mouseWorld = new THREE.Vector3(mouse.sx * 8, mouse.sy * 5, 0);
            const posArr = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                // Physics: spring to target
                const dx = targetPositions[i3] - posArr[i3];
                const dy = targetPositions[i3 + 1] - posArr[i3 + 1];
                const dz = targetPositions[i3 + 2] - posArr[i3 + 2];

                velocities[i3] += dx * 0.03;
                velocities[i3 + 1] += dy * 0.03;
                velocities[i3 + 2] += dz * 0.03;

                // Mouse interaction removed

                // Noise/Drift for all shapes
                velocities[i3] += Math.sin(t + i) * 0.002;
                velocities[i3 + 1] += Math.cos(t + i * 0.5) * 0.002;

                velocities[i3] *= 0.85; // Damping
                velocities[i3 + 1] *= 0.85;
                velocities[i3 + 2] *= 0.85;

                posArr[i3] += velocities[i3];
                posArr[i3 + 1] += velocities[i3 + 1];
                posArr[i3 + 2] += velocities[i3 + 2];
            }
            geometry.attributes.position.needsUpdate = true;

            // Camera & Rendering
            particleMat.uniforms.uTime.value = t;
            flagMat.uniforms.uTime.value = t; // Update flag time

            const rotY = autoRotation.y;
            const rotX = autoRotation.x;
            particles.rotation.y = rotY;
            particles.rotation.x = rotX;

            // camera.position.x = mouse.sx * 2;
            // camera.position.y = mouse.sy * 2;
            camera.lookAt(0, 0, 0);

            // Post-processing
            ppMat.uniforms.uIntensity.value = glitchIntensity.value;
            ppMat.uniforms.uTime.value = t;

            if (glitchIntensity.value > 0.01) {
                renderer.setRenderTarget(rtA);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                ppMat.uniforms.tDiffuse.value = rtA.texture;
                renderer.render(ppScene, ppCamera);
            } else {
                renderer.render(scene, camera);
            }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            const pr = Math.min(devicePixelRatio, 2);
            rtA.setSize(innerWidth * pr, innerHeight * pr);
        });

        // Loading Screen Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, 1000);
            }
        });
    </script>
</body>
