<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Glowing Cyberbird</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000208; }
    </style>
  </head>
  <body>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
      import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
      import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

      // 1. SCENE SETUP
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000208); // Deep space blue/black
      scene.fog = new THREE.FogExp2(0x000208, 0.015);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(6, 3, 8); // Slightly further back and higher view

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.toneMapping = THREE.ReinhardToneMapping; 
      renderer.toneMappingExposure = 1.5;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.3;
      controls.maxPolarAngle = Math.PI / 1.5; // Prevent going too far under

      // 2. LIGHTING
      const ambientLight = new THREE.AmbientLight(0x112244, 0.4); 
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0x00eaff, 3);
      mainLight.position.set(5, 10, 5);
      scene.add(mainLight);

      const rimLight = new THREE.DirectionalLight(0xff0055, 2);
      rimLight.position.set(-5, -5, -10);
      scene.add(rimLight);


      // 3. MATERIALS (Reused from Fly but tweaked colors)

      const neonCyan = new THREE.Color(0x00eaff);
      const neonMagenta = new THREE.Color(0xff0055);
      const neonGold = new THREE.Color(0xffaa00); // New color for beak/eyes

      // Main body material
      const bodyMat = new THREE.MeshStandardMaterial({
          color: 0x050505,
          metalness: 0.95,
          roughness: 0.1,
          emissive: neonCyan,
          emissiveIntensity: 0.6
      });

      // Beak and eye material
      const accentMat = new THREE.MeshStandardMaterial({
          color: 0x000000,
          metalness: 0.8,
          roughness: 0.1,
          emissive: neonGold,
          emissiveIntensity: 3.0
      });

      // Wireframe overlay
      const wireframeMat = new THREE.LineBasicMaterial({ 
          color: neonCyan, 
          linewidth: 1,
          transparent: true,
          opacity: 0.4,
          blending: THREE.AdditiveBlending
      });

      // Glassy Wings
      const wingMat = new THREE.MeshPhysicalMaterial({
          color: 0x00eaff,
          metalness: 0.1,
          roughness: 0.05,
          transmission: 0.9,
          ior: 1.3,
          thickness: 0.2,
          emissive: neonCyan,
          emissiveIntensity: 0.4,
          transparent: true,
          opacity: 0.7,
          side: THREE.DoubleSide
      });


      // 4. BUILDING THE CYBERBIRD GEOMETRY

      const cyberBird = new THREE.Group();
      scene.add(cyberBird);

      // Helper function for solid mesh + wireframe
      function createPart(geometry, material, parentGroup) {
          const mesh = new THREE.Mesh(geometry, material);
          parentGroup.add(mesh);
          const wireGeo = new THREE.WireframeGeometry(geometry);
          const wireLines = new THREE.LineSegments(wireGeo, wireframeMat);
          mesh.add(wireLines);
          return mesh;
      }

      // --- Bird Body Construction ---
      
      // Main Body - Streamlined, tapered sphere
      const bodyGeo = new THREE.SphereGeometry(1, 16, 16);
      bodyGeo.scale(0.7, 0.7, 2.5); // Elongate Z axis
      const body = createPart(bodyGeo, bodyMat, cyberBird);

      // Head
      const headGeo = new THREE.SphereGeometry(0.6, 12, 12);
      const head = createPart(headGeo, bodyMat, cyberBird);
      head.position.set(0, 0.3, -2.2); // Position at front

      // Beak - Pyramid shape
      const beakGeo = new THREE.ConeGeometry(0.2, 0.8, 4);
      beakGeo.rotateX(Math.PI / 2); // Point forward
      const beak = createPart(beakGeo, accentMat, head);
      beak.position.z = -0.7;

      // Eyes
      const eyeGeo = new THREE.SphereGeometry(0.15, 8, 8);
      const eyeLeft = new THREE.Mesh(eyeGeo, accentMat);
      eyeLeft.position.set(0.35, 0.1, -0.3);
      head.add(eyeLeft);
      const eyeRight = eyeLeft.clone();
      eyeRight.position.set(-0.35, 0.1, -0.3);
      head.add(eyeRight);

      // Tail - Flattened cone
      const tailGeo = new THREE.ConeGeometry(0.8, 1.5, 4);
      tailGeo.scale(1, 0.1, 1); // Flatten vertically
      tailGeo.rotateX(-Math.PI / 2); // Point backward
      const tail = createPart(tailGeo, bodyMat, cyberBird);
      tail.position.set(0, 0, 2.5);

      // --- Wings Construction ---
      const leftWingGroup = new THREE.Group();
      const rightWingGroup = new THREE.Group();
      cyberBird.add(leftWingGroup);
      cyberBird.add(rightWingGroup);

      // Large, swept-back wing geometry
      const wingShapeGeo = new THREE.BoxGeometry(4.5, 0.05, 1.8);
      // Translate to pivot from the "shoulder"
      wingShapeGeo.translate(2.25, 0, 0); 

      const leftWing = new THREE.Mesh(wingShapeGeo, wingMat);
      leftWingGroup.add(leftWing);
      
      // Add wireframe to wing
      const wingWire = new THREE.LineSegments(new THREE.WireframeGeometry(wingShapeGeo), wireframeMat);
      leftWing.add(wingWire);

      const rightWing = leftWing.clone();
      rightWingGroup.add(rightWing);

      // Position Wing Groups on the sides of the body
      leftWingGroup.position.set(0.5, 0.1, -0.5);
      // Initial sweep back and tilt
      leftWingGroup.rotation.y = 0.3; 
      leftWingGroup.rotation.x = -0.2;

      rightWingGroup.position.set(-0.5, 0.1, -0.5);
      rightWingGroup.rotation.y = -0.3;
      rightWingGroup.rotation.x = -0.2;
      rightWingGroup.scale.x = -1; // Mirror flip

      // 5. POST-PROCESSING (BLOOM)
      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      bloomPass.threshold = 0.15;
      bloomPass.strength = 2.2; // Slightly stronger glow than the fly
      bloomPass.radius = 0.9;

      const composer = new EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);


      // 6. ANIMATION LOOP
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        controls.update();

        // 1. General Body Motion (Hovering/Gliding)
        // Slower, wider sine wave for gliding motion
        cyberBird.position.y = Math.sin(time * 1.2) * 0.5;
        // Gentle pitching up and down
        cyberBird.rotation.x = Math.sin(time * 1.2 - 1) * 0.1;

        // 2. Wing Beat Animation (Bird physics)
        // Much slower speed than insect: time * 8 instead of 30
        const wingSpeed = time * 8; 
        // Larger amplitude for big wings
        const wingAmplitude = 0.8;   

        // Primary Flap (Z-axis rotation)
        const flapZ = Math.sin(wingSpeed) * wingAmplitude;
        
        // Secondary "Feathering" Motion (X-axis rotation)
        // Birds angle their wings on the upstroke to reduce drag.
        // We offset the phase (-0.5) so it happens at a different part of the beat.
        const featherX = Math.sin(wingSpeed - 0.5) * 0.3; 

        leftWingGroup.rotation.z = flapZ;
        leftWingGroup.rotation.x = -0.2 + featherX; // -0.2 is base tilt

        // Right wing (opposite Z flap, same X feathering)
        rightWingGroup.rotation.z = -flapZ;
        rightWingGroup.rotation.x = -0.2 + featherX;

        // 3. Tail motion
        // Gentle counter-balance bobbing
        tail.rotation.x = Math.sin(time * 2) * 0.1;

        composer.render();
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
